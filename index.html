<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarBudget | Smart Finance</title>
    
    <!-- ADD THESE 3 LINES FOR PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4a90e2">
    <link rel="apple-touch-icon" href="./icon-192.png">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #f4f7fb 0%, #d7dee6 100%);
            --card-bg: rgba(255, 255, 255, 0.82);
            --text-main: #24324a;
            --accent: #4a90e2;
            --border-radius: 20px;
            --font-size: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        [data-theme="dark"] {
            --bg-grad: linear-gradient(135deg, #121b29 0%, #192a3d 100%);
            --card-bg: rgba(11, 18, 30, 0.75);
            --text-main: #e9eef5;
            --accent: #4a90e2;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: var(--transition); }
        body {
            margin: 0; background: var(--bg-grad); background-attachment: fixed;
            color: var(--text-main); font-size: var(--font-size);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden; overflow-y: auto;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-view { animation: slideUp 0.5s ease forwards; }

        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-grad); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 50px 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 90%; max-width: 400px;
            animation: popIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-google {
            background: #fff; color: #333; padding: 12px 20px;
            border-radius: 25px; font-size: 16px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; margin-top: 30px; cursor: pointer; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        #navbar, main { display: none; }
        nav {
            display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px 20px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .nav-links { display: flex; gap: 15px; justify-content: center; flex: 1; }
        .nav-links span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 18px;
            cursor: pointer;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0.6;
            transition: background 0.3s ease, opacity 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            transform: none;
        }
        .nav-links span:hover { background: var(--card-bg); opacity: 1; }
        .nav-links span:active { transform: none; }
        .nav-links span.active { background: var(--accent); color: white; opacity: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .user-profile {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
        }
        #syncStatus {
            width: 90px; min-width: 90px; text-align: right; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; display: inline-block;
        }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .logout-btn { background: transparent; color: #e74c3c; box-shadow: none; padding: 5px 8px; font-size: 12px; margin: 0; }
        .logout-btn:hover { background: rgba(231, 76, 60, 0.1); }

        main { flex: 1; overflow: auto; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .view { flex: 3; min-width: 0; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: var(--border-radius); padding: 30px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .sidebar { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 25px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        h1, h2, h3 { margin-top: 0; }
        .text-muted { opacity: 0.7; font-size: 0.85em; }
        .positive { color: #2ecc71 !important; font-weight: bold; }
        .negative { font-weight: bold; color: #e74c3c !important;}

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; margin-bottom: 12px; border-radius: 15px;
            background: rgba(255,255,255,0.1); cursor: pointer; border: 1px solid transparent; gap: 10px;
        }
        .list-item > div:first-child { flex: 1; min-width: 0; padding-right: 15px; }
        .list-item > div:first-child > div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-item:hover { transform: translateX(5px); border-color: var(--accent); background: rgba(255,255,255,0.2); }
        .toggle-visibility-btn {
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: inherit;
            padding: 6px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.95em;
            min-width: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }
        .toggle-visibility-btn:hover { background: rgba(255,255,255,0.15); }
        .toggle-visibility-btn:active { transform: scale(0.98); }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
        .table-responsive table { min-width: 600px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        tr:hover td { background: rgba(255,255,255,0.05); cursor: pointer; }

        button {
            border: none; padding: 10px 20px; border-radius: 20px; background: var(--accent);
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button.danger { background: #e74c3c; }
        button.secondary { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); box-shadow: none; }

        input, select {
            width: 100%; padding: 12px 15px; margin: 8px 0 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
            color: var(--text-main); font-size: 1rem; outline: none; backdrop-filter: blur(5px); box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--accent); }
        option { background: var(--bg-grad); color: #000; }

        /* Search & filter bar */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .filter-bar input, .filter-bar select { margin: 0; flex: 1; min-width: 120px; padding: 10px 14px; }
        .filter-bar .filter-count { font-size: 0.8em; opacity: 0.6; white-space: nowrap; padding: 0 5px; }

        /* Budget bar */
        .budget-bar-wrap { margin-top: 6px; }
        .budget-bar-track { background: rgba(255,255,255,0.1); border-radius: 10px; height: 7px; overflow: hidden; }
        .budget-bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s ease; }
        .budget-label { display: flex; justify-content: space-between; font-size: 0.75em; opacity: 0.7; margin-top: 3px; }

        /* Dashboard Additions */
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 15px; }
        .dash-layout-main { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .dash-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: var(--border-radius); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .dash-card h3 { margin: 0 0 10px 0; font-size: 1.1em; opacity: 0.9; display: flex; justify-content: space-between; align-items: center; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; margin-bottom: 8px; }
        .stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .stat-label { font-size: 0.9em; opacity: 0.8; }
        .stat-value { font-weight: bold; font-size: 1.1em; }
        .dash-alert { padding: 12px 15px; border-radius: 12px; margin-bottom: 15px; font-size: 0.95em; font-weight: bold; display: flex; align-items: center; gap: 10px; animation: popIn 0.3s ease; }
        .dash-alert.danger { background: rgba(231, 76, 60, 0.15); color: #ff6b6b; border: 1px solid rgba(231, 76, 60, 0.4); }
        .dash-alert.warning { background: rgba(243, 156, 18, 0.15); color: #f39c12; border: 1px solid rgba(243, 156, 18, 0.4); }
        .insight-list { padding-left: 20px; margin: 0; font-size: 0.9em; line-height: 1.6; opacity: 0.8; }
        .insight-list li { margin-bottom: 8px; }

        /* Offline banner */
        #offlineBanner { display: none; background: #f39c12; color: #fff; text-align: center; padding: 6px 15px; font-size: 13px; font-weight: bold; letter-spacing: 0.5px; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { padding: 15px 5px; border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; position: relative; min-height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .cal-day:hover { background: var(--accent); color: white; transform: scale(1.05); }
        .cal-day.today { background: var(--accent); color: white; box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.12); }
        .cal-day.empty { background: transparent; cursor: default; }
        .cal-day.empty:hover { transform: none; }
        .cal-dot { height: 6px; width: 6px; background: var(--accent); border-radius: 50%; margin-top: 5px; }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .chart-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: var(--border-radius); }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* Budget settings table */
        .budget-setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .budget-setting-row label { flex: 1; font-size: 0.9em; }
        .budget-setting-row input { flex: 1; margin: 0; padding: 8px 12px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: var(--bg-grad); padding: 35px; border-radius: var(--border-radius); width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); animation: popIn 0.3s ease; }

        .flex-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .signature { position: fixed; bottom: 15px; right: 25px; font-size: 12px; opacity: 0.5; font-weight: bold; letter-spacing: 1px; z-index: 50; }

        .color-picker { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .swatch { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .swatch.active { border-color: var(--text-main); transform: scale(1.1); }

        #accountsToggle { display: none; padding: 8px 15px; font-size: 12px; margin-left: 10px; }

        @media (max-width: 900px) {
            .dash-layout-main { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            html, body { min-height: 100%; overflow-x: hidden; }
            nav { padding: 10px 0; gap: 10px; flex-direction: column; }
            .nav-links {
                flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start;
                width: 100%; padding: 5px 15px 10px 15px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
            }
            .nav-links::-webkit-scrollbar { display: none; }
            .nav-links span { flex: 0 0 auto; text-align: center; }
            .user-profile { width: auto; margin: 0 15px 10px 15px; justify-content: center; flex-wrap: wrap; }
            #syncStatus { width: auto; min-width: 0; }
            main { flex-direction: column; padding: 10px; gap: 10px; overflow: visible; }
            .view, .sidebar { width: 100%; min-width: 0; }
            .view { flex: none; padding: 20px 15px; }
            .sidebar { display: flex; position: static; width: 100%; max-width: none; height: auto; background: transparent; box-shadow: none; transform: none; padding: 0; margin-top: 0; }
            .sidebar .card { margin-bottom: 15px; }
            #accountsToggle { display: none; }
            .table-responsive table { min-width: 100%; }
            .chart-grid { grid-template-columns: 1fr; gap: 20px; }
            .settings-grid { grid-template-columns: 1fr; gap: 15px; }
            .flex-row { justify-content: center; flex-wrap: wrap; }
            .flex-row button { flex-grow: 1; }
            .modal { max-width: 95%; padding: 25px 20px; max-height: 90vh; overflow-y: auto; }
            .cal-header { flex-direction: column; gap: 15px; align-items: stretch; text-align: center; }
            .cal-header > div { display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 10px; }
            #calMonthYear { margin: 0; }
            .calendar-grid { gap: 4px; }
            .cal-day { min-height: 48px; padding: 10px 2px; font-size: 13px; }
            h1 { font-size: 2em !important; }
            h2 { font-size: 1.5em; }
            .signature { position: relative; bottom: 0; right: 0; text-align: center; padding: 15px 0; display: block; }
            .filter-bar { flex-direction: column; }
            .filter-bar input, .filter-bar select { width: 100%; }
        }
    </style>
</head>
<body data-theme="dark">

<div id="offlineBanner">⚠ Offline — changes saved locally and will sync when reconnected</div>

<div id="loginScreen">
    <div class="login-card">
        <h1 style="font-size: 2.8em; margin-bottom: 5px;">Star<span style="color: var(--accent)">Budget</span></h1>
        <p class="text-muted" style="letter-spacing: 2px;">SMART FINANCE</p>
        <button class="btn-google" id="googleSignInBtn">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="24" alt="Google Logo">
            Sign in with Google
        </button>
    </div>
</div>

<nav id="navbar">
    <div class="nav-links" id="navLinks">
        <span data-target="home" class="active">Dashboard</span>
        <span data-target="table">Transactions</span>
        <span data-target="calendar">Smart Calendar</span>
        <span data-target="overview">Overview</span>
        <span data-target="settings">Settings</span>
    </div>
    <div class="user-profile" id="userProfile">
        <span id="syncStatus" style="font-size: 11px; font-weight: bold; margin-right: 8px;"></span>
        <img id="userPic" src="https://via.placeholder.com/32" alt="Profile">
        <span id="userName" style="font-size: 14px; font-weight: bold;">User</span>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
</nav>

<main id="appMain">
    <section class="view animate-view" id="view-container"></section>
    <aside class="sidebar" id="sidebar">
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <div class="text-muted" style="letter-spacing:1px;">TOTAL NET WORTH</div>
                <button id="toggleNetWorthVisibility" class="toggle-visibility-btn" type="button" aria-label="Toggle net worth visibility">👁️</button>
            </div>
            <h1 id="netWorthDisplay" style="font-size: 2.5em; margin: 10px 0;">$0.00</h1>
        </div>
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                <strong style="letter-spacing:1px;">ACCOUNTS</strong>
                <div style="display:flex; align-items: center;">
                    <button onclick="openAccountModal()" style="padding: 5px 12px; font-size:12px; margin-right:5px;">Add +</button>
                    <button id="accountsToggle" style="padding: 5px 12px; font-size:12px;">&times;</button>
                </div>
            </div>
            <div id="accList"></div>
        </div>
    </aside>
</main>

<!-- Modals -->
<div class="overlay" id="formModal">
    <div class="modal">
        <h2 id="modalTitle">Edit</h2>
        <div id="modalContent"></div>
        <div class="flex-row">
            <button class="secondary" onclick="closeModal('formModal')">Cancel</button>
            <button class="danger" id="modalDeleteBtn">Delete</button>
            <button id="modalSaveBtn">Save</button>
        </div>
    </div>
</div>

<div class="overlay" id="dayModal">
    <div class="modal" style="max-width: 500px;">
        <h2 id="dayModalTitle">Transactions</h2>
        <div id="dayModalContent" style="max-height: 300px; overflow-y: auto; margin: 15px 0;"></div>
        <div class="flex-row"><button onclick="closeModal('dayModal')">Close</button></div>
    </div>
</div>

<div class="signature">Created by Adit Malakar</div>

<script>
    // ─── MIGRATION / SAFE DEFAULTS ─────────────────────────────────────────────
    function migrateState(raw) {
        if (!raw || typeof raw !== 'object') return null;
        if (!Array.isArray(raw.transactions)) raw.transactions = [];
        if (!Array.isArray(raw.accounts)) raw.accounts = [];
        if (!Array.isArray(raw.categories)) raw.categories = ["Food", "Shopping", "Income", "Bills", "Entertainment", "Housing"];
        if (!raw.settings || typeof raw.settings !== 'object') raw.settings = {};

        const settingDefaults = { theme: 'dark', bgGrad: 'purple', accent: '#bb86fc', fontSize: 16, currency: '$', budgets: {} };
        for (const [k, v] of Object.entries(settingDefaults)) {
            if (raw.settings[k] === undefined) raw.settings[k] = v;
        }
        if (typeof raw.settings.budgets !== 'object' || Array.isArray(raw.settings.budgets)) raw.settings.budgets = {};
        if (typeof raw.settings.hideBalances !== 'boolean') raw.settings.hideBalances = false;

        raw.transactions = raw.transactions.map(t => ({
            id: t.id ?? Date.now(),
            accountId: t.accountId ?? (raw.accounts[0]?.id ?? 1),
            name: t.name ?? 'Unnamed',
            merchant: t.merchant ?? '',
            amount: typeof t.amount === 'number' ? t.amount : 0,
            category: t.category ?? raw.categories[0],
            date: t.date ?? new Date().toISOString().split('T')[0]
        }));

        raw.accounts = raw.accounts.map(a => ({
            id: a.id ?? Date.now(),
            name: a.name ?? 'Account',
            initialBalance: typeof a.initialBalance === 'number' ? a.initialBalance : 0
        }));

        return raw;
    }

    // ─── DEFAULT STATE ─────────────────────────────────────────────────────────
    const DEFAULT_STATE = {
        transactions: [
            { id: 1, accountId: 1, name: "Grocery Shopping", merchant: "Whole Foods", amount: -120.50, category: "Food", date: new Date().toISOString().split('T')[0] },
            { id: 2, accountId: 1, name: "Monthly Salary", merchant: "Tech Corp", amount: 4500.00, category: "Income", date: new Date().toISOString().split('T')[0] }
        ],
        accounts: [
            { id: 1, name: "Main Checking", initialBalance: 5000 },
            { id: 2, name: "High Yield Savings", initialBalance: 20000 }
        ],
        categories: ["Food", "Shopping", "Income", "Bills", "Entertainment", "Housing"],
        settings: { theme: 'dark', bgGrad: 'purple', accent: '#bb86fc', fontSize: 16, currency: '$', budgets: {}, hideBalances: false }
    };

    let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    let currentView = 'home';
    let editingId = null;
    let editingType = null;
    let calDate = new Date();
    let chartInstances = [];
    let isSidebarVisible = false;
    let isOnline = navigator.onLine;
    let totalNetWorthGlobal = 0;

    // ─── LOCALSTORAGE ──────────────────────────────────────────────────────────
    const LS_KEY = 'starbudget_local_state';
    function saveToLocalStorage() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {} }
    function loadFromLocalStorage() { try { const raw = localStorage.getItem(LS_KEY); return raw ? migrateState(JSON.parse(raw)) : null; } catch(e) { return null; } }

    // ─── ONLINE/OFFLINE DETECTION ──────────────────────────────────────────────
    function updateOnlineStatus() {
        isOnline = navigator.onLine;
        document.getElementById('offlineBanner').style.display = isOnline ? 'none' : 'block';
    }
    window.addEventListener('online', () => { updateOnlineStatus(); trySyncPending(); });
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    let pendingSync = false;
    function trySyncPending() { if (pendingSync && isOnline && window._firebaseSyncFn) { pendingSync = false; window._firebaseSyncFn(state); } }

    // ─── FIREBASE BRIDGE ──────────────────────────────────────────────────────
    window.applyCloudState = function(cloudState) { const migrated = migrateState(cloudState); if (migrated) { state = migrated; saveToLocalStorage(); updateUI(); } };
    window.firebaseSyncState = async (appState) => { saveToLocalStorage(); if (!isOnline) { pendingSync = true; return; } if (window._firebaseSyncFn) window._firebaseSyncFn(appState); };
    function saveState() { updateUI(); window.firebaseSyncState(state); }

    // ─── ACCOUNT/FINANCE HELPERS ───────────────────────────────────────────────
    function getAccountBalance(accId) {
        const acc = state.accounts.find(a => a.id == accId);
        if (!acc) return 0;
        return acc.initialBalance + state.transactions.filter(t => t.accountId == accId).reduce((s, t) => s + t.amount, 0);
    }

    function getTxSummary(txs) {
        return txs.reduce((acc, t) => {
            if(t.amount > 0) acc.inc += t.amount;
            else acc.exp += Math.abs(t.amount);
            acc.net = acc.inc - acc.exp;
            return acc;
        }, {inc: 0, exp: 0, net: 0});
    }

    // ─── SEARCH/FILTER STATE ──────────────────────────────────────────────────
    let filterQuery = ''; let filterCategory = ''; let filterAccount = '';
    function getFilteredTransactions() {
        return state.transactions.filter(t => {
            const q = filterQuery.toLowerCase();
            const matchText = !q || t.name.toLowerCase().includes(q) || t.merchant.toLowerCase().includes(q) || t.category.toLowerCase().includes(q);
            const matchCat = !filterCategory || t.category === filterCategory;
            const matchAcc = !filterAccount || String(t.accountId) === String(filterAccount);
            return matchText && matchCat && matchAcc;
        });
    }

    function buildFilterBar(showCounts) {
        const total = state.transactions.length;
        const filtered = getFilteredTransactions().length;
        const countLabel = (filterQuery || filterCategory || filterAccount) ? `${filtered} of ${total}` : `${total} total`;
        return `
            <div class="filter-bar">
                <input type="text" placeholder="Search name, merchant, category…" value="${filterQuery.replace(/"/g,'&quot;')}" oninput="filterQuery=this.value; renderView()" style="margin:0;">
                <select onchange="filterCategory=this.value; renderView()" style="margin:0; flex:0.6;">
                    <option value="">All Categories</option>
                    ${state.categories.map(c => `<option value="${c}" ${filterCategory===c?'selected':''}>${c}</option>`).join('')}
                </select>
                <select onchange="filterAccount=this.value; renderView()" style="margin:0; flex:0.6;">
                    <option value="">All Accounts</option>
                    ${state.accounts.map(a => `<option value="${a.id}" ${filterAccount==a.id?'selected':''}>${a.name}</option>`).join('')}
                </select>
                <span class="filter-count">${countLabel}</span>
                ${(filterQuery||filterCategory||filterAccount) ? `<button class="secondary" onclick="filterQuery='';filterCategory='';filterAccount='';renderView()" style="padding:6px 14px;font-size:12px;">Clear</button>` : ''}
            </div>`;
    }

    // ─── BUDGET HELPERS ────────────────────────────────────────────────────────
    function getCurrentMonthSpendByCategory() {
        const now = new Date();
        const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const totals = {};
        state.transactions.forEach(t => {
            if (t.amount < 0 && t.date && t.date.startsWith(ym)) {
                totals[t.category] = (totals[t.category] || 0) + Math.abs(t.amount);
            }
        });
        return totals;
    }

    function buildBudgetBar(category, spent, limit) {
        if (!limit || limit <= 0) return '';
        const pct = Math.min(100, (spent / limit) * 100);
        const over = spent > limit;
        const barColor = pct >= 100 ? '#e74c3c' : pct >= 80 ? '#f39c12' : '#2ecc71';
        return `
            <div class="budget-bar-wrap" style="margin-bottom:12px;">
                <div class="budget-label" style="margin-bottom:4px; margin-top:0; font-size:0.85em;">
                    <strong>${category}</strong>
                    <span>${state.settings.currency}${spent.toFixed(0)} / ${state.settings.currency}${limit.toFixed(0)}</span>
                </div>
                <div class="budget-bar-track">
                    <div class="budget-bar-fill" style="width:${pct}%; background:${barColor};"></div>
                </div>
            </div>`;
    }

    // ─── UI ────────────────────────────────────────────────────────────────────
    function formatBalanceAmount(amount) {
        if (state.settings.hideBalances) return '••••••';
        return `${state.settings.currency}${amount.toLocaleString(undefined,{minimumFractionDigits:2})}`;
    }

    function updateUI() {
        applySettings();
        totalNetWorthGlobal = 0;
        const accHTML = state.accounts.map(acc => {
            const bal = getAccountBalance(acc.id);
            totalNetWorthGlobal += bal;
            return `<div class="list-item" onclick="openAccountModal(${acc.id})" style="padding: 10px 15px;">
                <span>${acc.name}</span>
                <strong style="color:${bal<0?'#e74c3c':'inherit'}">${formatBalanceAmount(bal)}</strong>
            </div>`;
        }).join('');
        document.getElementById('accList').innerHTML = accHTML || '<p class="text-muted">No accounts added.</p>';
        document.getElementById('netWorthDisplay').innerText = formatBalanceAmount(totalNetWorthGlobal);
        const toggleBtn = document.getElementById('toggleNetWorthVisibility');
        if (toggleBtn) {
            toggleBtn.textContent = state.settings.hideBalances ? '🙈' : '👁️';
            toggleBtn.title = state.settings.hideBalances ? 'Show balances' : 'Hide balances';
        }
        renderView();
    }

    document.querySelectorAll('#navLinks span').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('#navLinks span').forEach(s => s.classList.remove('active'));
            btn.classList.add('active');
            currentView = btn.dataset.target;
            filterQuery = ''; filterCategory = ''; filterAccount = '';
            renderView();
        };
    });

    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
        if (e.key === 'Escape') { closeModal('formModal'); closeModal('dayModal'); }
        if (e.key === 'n' || e.key === 'N') { if (document.getElementById('formModal').style.display !== 'flex') openTransModal(); }
    });

    function renderView() {
        const container = document.getElementById('view-container');
        container.innerHTML = '';
        container.classList.remove('animate-view');
        void container.offsetWidth;
        container.classList.add('animate-view');

        if (chartInstances.length) { chartInstances.forEach(c => c.destroy()); chartInstances = []; }

        const cur = state.settings.currency;

        if (currentView === 'home') {
            // Dashboard calculations
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const monthStr = todayStr.slice(0, 7);
            const weekAgo = new Date(today);
            weekAgo.setDate(weekAgo.getDate() - 7);
            const weekAgoStr = weekAgo.toISOString().split('T')[0];

            const txsToday = state.transactions.filter(t => t.date === todayStr);
            const txsWeek = state.transactions.filter(t => t.date >= weekAgoStr && t.date <= todayStr);
            const txsMonth = state.transactions.filter(t => t.date.startsWith(monthStr));

            const sumToday = getTxSummary(txsToday);
            const sumWeek = getTxSummary(txsWeek);
            const sumMonth = getTxSummary(txsMonth);

            // Budget Alerts & Previews
            const monthSpend = getCurrentMonthSpendByCategory();
            const budgets = state.settings.budgets || {};
            let alertsHTML = '';
            let budgetPreviews = [];
            let totalBudgetLimit = 0;
            let totalBudgetSpend = 0;

            Object.keys(budgets).forEach(cat => {
                const limit = budgets[cat];
                if(limit > 0) {
                    const spent = monthSpend[cat] || 0;
                    const pct = (spent / limit) * 100;
                    totalBudgetLimit += limit;
                    totalBudgetSpend += spent;

                    if(pct >= 100) alertsHTML += `<div class="dash-alert danger">⚠️ You have exceeded your budget for ${cat}!</div>`;
                    else if(pct >= 85) alertsHTML += `<div class="dash-alert warning">⚠️ You are nearing your budget limit for ${cat}.</div>`;

                    budgetPreviews.push({ cat, limit, spent, pct });
                }
            });
            budgetPreviews.sort((a,b) => b.pct - a.pct); // Highest % first

            // Insights
            const insights = [];
            if(sumMonth.net > 0) insights.push(`You have a surplus of <strong>${cur}${sumMonth.net.toFixed(2)}</strong> this month!`);
            else if(sumMonth.net < 0) insights.push(`You are running a deficit of <strong>${cur}${Math.abs(sumMonth.net).toFixed(2)}</strong> this month.`);
            
            const expWeekList = txsWeek.filter(t => t.amount < 0).sort((a,b) => a.amount - b.amount);
            if(expWeekList.length > 0) insights.push(`Largest expense this week: <strong>${expWeekList[0].name}</strong> (${cur}${Math.abs(expWeekList[0].amount).toFixed(2)})`);

            // Chart Data Prep
            const last7DaysLabels = [];
            const last7DaysData = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                last7DaysLabels.push(d.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric' }));
                const dStr = d.toISOString().split('T')[0];
                const dayExp = state.transactions.filter(t => t.date === dStr && t.amount < 0).reduce((sum, t) => sum + Math.abs(t.amount), 0);
                last7DaysData.push(dayExp);
            }

            const recent5 = state.transactions.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

            container.innerHTML = `
                <div class="cal-header" style="margin-bottom:10px;">
                    <h2 style="margin:0;">Dashboard Overview</h2>
                    <button onclick="openTransModal()">+ Add Transaction</button>
                </div>
                <p class="text-muted" style="font-size:0.8em; margin-bottom:20px;">Press <kbd style="background:rgba(255,255,255,0.15);padding:2px 6px;border-radius:5px;">N</kbd> to quickly add an item.</p>
                
                <div id="dash-alerts">${alertsHTML}</div>
                
                <div class="dash-grid">
                    <div class="dash-card">
                        <h3>Net Worth</h3>
                        <div style="font-size:2em; font-weight:bold; margin:10px 0;">${formatBalanceAmount(totalNetWorthGlobal)}</div>
                        <div class="text-muted" style="font-size:0.85em;">Across ${state.accounts.length} account(s)</div>
                    </div>
                    <div class="dash-card">
                        <h3>Today</h3>
                        <div class="stat-row"><span class="stat-label">Income</span><span class="stat-value positive">+${cur}${sumToday.inc.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Expenses</span><span class="stat-value negative">-${cur}${sumToday.exp.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Net</span><span class="stat-value ${sumToday.net<0?'negative':'positive'}">${cur}${Math.abs(sumToday.net).toFixed(2)}</span></div>
                    </div>
                    <div class="dash-card">
                        <h3>This Week</h3>
                        <div class="stat-row"><span class="stat-label">Income</span><span class="stat-value positive">+${cur}${sumWeek.inc.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Expenses</span><span class="stat-value negative">-${cur}${sumWeek.exp.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Net</span><span class="stat-value ${sumWeek.net<0?'negative':'positive'}">${cur}${Math.abs(sumWeek.net).toFixed(2)}</span></div>
                    </div>
                    <div class="dash-card">
                        <h3>This Month</h3>
                        <div class="stat-row"><span class="stat-label">Income</span><span class="stat-value positive">+${cur}${sumMonth.inc.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Expenses</span><span class="stat-value negative">-${cur}${sumMonth.exp.toFixed(2)}</span></div>
                        <div class="stat-row"><span class="stat-label">Net</span><span class="stat-value ${sumMonth.net<0?'negative':'positive'}">${cur}${Math.abs(sumMonth.net).toFixed(2)}</span></div>
                    </div>
                </div>

                <div class="dash-layout-main">
                    <div class="dash-card">
                        <h3>Weekly Spending Overview</h3>
                        <canvas id="dashWeeklyChart" style="max-height: 250px;"></canvas>
                    </div>
                    <div class="dash-card">
                        <h3>Quick Insights</h3>
                        <ul class="insight-list">
                            ${insights.map(i => `<li>${i}</li>`).join('') || '<li>Not enough data for insights yet.</li>'}
                        </ul>
                        
                        <h3 style="margin-top:20px;">Budget Status</h3>
                        ${totalBudgetLimit > 0 ? buildBudgetBar('Overall Total', totalBudgetSpend, totalBudgetLimit) : ''}
                        <div style="margin-top:10px;">
                            ${budgetPreviews.slice(0,3).map(b => buildBudgetBar(b.cat, b.spent, b.limit)).join('') || '<p class="text-muted" style="font-size:0.85em;">No active budgets limits to display.</p>'}
                        </div>
                    </div>
                </div>

                <div class="dash-card" style="margin-top:20px;">
                    <div class="cal-header" style="margin-bottom:0;">
                        <h3 style="margin:0;">Recent Transactions</h3>
                        <button class="secondary" style="padding:6px 14px; font-size:0.85em;" onclick="document.querySelector('[data-target=table]').click()">View All</button>
                    </div>
                    <div style="margin-top:15px;">
                        ${recent5.map(t => `
                            <div class="list-item" onclick="openTransModal(${t.id})">
                                <div><div style="font-weight:600;">${t.name}</div><div class="text-muted" style="font-size:0.85em;">${t.category} • ${state.accounts.find(a=>a.id==t.accountId)?.name||'Unknown'} • ${t.date}</div></div>
                                <div class="${t.amount<0?'negative':'positive'}">${t.amount<0?'-':'+'}${cur}${Math.abs(t.amount).toFixed(2)}</div>
                            </div>`).join('') || '<p class="text-muted">No transactions recorded yet.</p>'}
                    </div>
                </div>`;

            // Initialize Dashboard Chart
            setTimeout(() => {
                const ctx = document.getElementById('dashWeeklyChart');
                if (ctx) {
                    Chart.defaults.color = state.settings.theme==='dark'?'#fff':'#000';
                    chartInstances.push(new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: last7DaysLabels,
                            datasets: [{
                                label: 'Expenses',
                                data: last7DaysData,
                                backgroundColor: state.settings.accent,
                                borderRadius: 8
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
                    }));
                }
            }, 50);

        } else if (currentView === 'table') {
            const sorted = getFilteredTransactions().slice().sort((a,b) => new Date(b.date)-new Date(a.date));
            container.innerHTML = `
                <div class="cal-header"><h2>All Transactions</h2><button onclick="openTransModal()">+ New</button></div>
                ${buildFilterBar(true)}
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Date</th><th>Item</th><th>Account</th><th>Category</th><th>Amount</th></tr></thead>
                        <tbody>${sorted.length ? sorted.map(t => `
                            <tr onclick="openTransModal(${t.id})">
                                <td>${t.date}</td>
                                <td><strong>${t.name}</strong><br><small class="text-muted">${t.merchant}</small></td>
                                <td>${state.accounts.find(a=>a.id==t.accountId)?.name||'N/A'}</td>
                                <td><span style="background:var(--accent);padding:3px 8px;border-radius:10px;font-size:12px;color:#fff;">${t.category}</span></td>
                                <td class="${t.amount<0?'negative':'positive'}">${cur}${t.amount.toFixed(2)}</td>
                            </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;opacity:0.5;padding:30px;">No transactions match your filters.</td></tr>'}
                        </tbody>
                    </table>
                </div>`;
        } else if (currentView === 'calendar') {
            container.innerHTML = `
                <div class="cal-header"><h2>Smart Calendar</h2><div>
                    <button class="secondary" onclick="changeMonth(-1)" style="padding:8px 15px;">&lt;</button>
                    <span id="calMonthYear" style="margin:0 15px;font-weight:bold;font-size:1.2em;"></span>
                    <button class="secondary" onclick="changeMonth(1)" style="padding:8px 15px;">&gt;</button>
                </div></div>
                <div class="calendar-grid" id="calGrid"></div>`;
            renderCalendar();
        } else if (currentView === 'overview') {
            const monthSpend = getCurrentMonthSpendByCategory();
            const budgets = state.settings.budgets || {};
            const budgetedCats = Object.keys(budgets).filter(c => budgets[c] > 0);

            const budgetSection = budgetedCats.length ? `
                <h3 style="margin-top:30px;">This Month's Budgets</h3>
                ${budgetedCats.map(c => `
                    <div style="margin-bottom:18px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <strong>${c}</strong>
                            <span style="font-size:0.8em;" class="text-muted">${cur}${(monthSpend[c]||0).toFixed(2)} spent</span>
                        </div>
                        ${buildBudgetBar(c, monthSpend[c]||0, budgets[c])}
                    </div>`).join('')}` : `
                <p class="text-muted" style="margin-top:20px; font-size:0.9em;">
                    No budgets set yet — go to <strong>Settings → Budget Limits</strong> to add them.
                </p>`;

            container.innerHTML = `
                <h2>Analytics Overview</h2>
                ${budgetSection}
                <div class="chart-grid">
                    <div class="chart-box"><h3>Spending by Category</h3><canvas id="pieChart"></canvas></div>
                    <div class="chart-box"><h3>Income vs Expenses</h3><canvas id="barChart"></canvas></div>
                </div>`;
            renderCharts();
        } else if (currentView === 'settings') {
            const colors = ['#4a90e2', '#e74c3c', '#bb86fc', '#2ecc71', '#f39c12', '#ff8fab'];
            const budgets = state.settings.budgets || {};
            container.innerHTML = `
                <h2>App Settings</h2>
                <div class="settings-grid">
                    <div>
                        <label class="text-muted">Theme Mode</label>
                        <select onchange="updateSetting('theme',this.value)">
                            <option value="light" ${state.settings.theme==='light'?'selected':''}>Light Mode</option>
                            <option value="dark" ${state.settings.theme==='dark'?'selected':''}>Dark Mode</option>
                        </select>
                        <label class="text-muted">Background Style</label>
                        <select onchange="updateSetting('bgGrad',this.value)">
                            <option value="light" ${state.settings.bgGrad==='light'?'selected':''}>Warm Marble</option>
                            <option value="blue" ${state.settings.bgGrad==='blue'?'selected':''}>Ocean Blue</option>
                            <option value="purple" ${state.settings.bgGrad==='purple'?'selected':''}>Deep Galaxy</option>
                        </select>
                        <label class="text-muted">Currency</label>
                        <select onchange="updateSetting('currency',this.value)">
                            <option value="$" ${state.settings.currency==='$'?'selected':''}>USD ($)</option>
                            <option value="€" ${state.settings.currency==='€'?'selected':''}>Euro (€)</option>
                            <option value="£" ${state.settings.currency==='£'?'selected':''}>GBP (£)</option>
                            <option value="Rs. " ${state.settings.currency==='Rs. '?'selected':''}>NRS/INR (Rs.)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-muted">Accent Color</label>
                        <div class="color-picker">${colors.map(c=>`<div class="swatch ${state.settings.accent===c?'active':''}" style="background:${c}" onclick="updateSetting('accent','${c}')"></div>`).join('')}</div>
                        <label class="text-muted">Interface Scale</label>
                        <input type="range" min="14" max="22" value="${state.settings.fontSize}" onchange="updateSetting('fontSize',this.value)">
                    </div>
                </div>

                <h3 style="margin-top:30px;">Budget Limits <span class="text-muted" style="font-weight:normal;font-size:0.8em;">— monthly spend caps per category</span></h3>
                <div id="budgetSettingsArea">
                    ${state.categories.map(c => `
                        <div class="budget-setting-row">
                            <label>${c}</label>
                            <input type="number" min="0" step="1" placeholder="No limit"
                                value="${budgets[c] > 0 ? budgets[c] : ''}"
                                onchange="updateBudget('${c}', this.value)"
                                style="width:130px; margin:0; padding:8px 12px; flex:none;">
                        </div>`).join('')}
                </div>`;
        }
    }

    function updateBudget(category, value) {
        if (!state.settings.budgets) state.settings.budgets = {};
        const num = parseFloat(value);
        if (!isNaN(num) && num > 0) state.settings.budgets[category] = num;
        else delete state.settings.budgets[category];
        saveState();
    }

    function changeMonth(dir) { calDate.setMonth(calDate.getMonth()+dir); renderCalendar(); }
    function renderCalendar() {
        const year = calDate.getFullYear(), month = calDate.getMonth();
        const firstDay = new Date(year,month,1).getDay(), daysInMonth = new Date(year,month+1,0).getDate();
        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('calMonthYear').innerText = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
        let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div style="font-weight:bold;opacity:0.7;">${d}</div>`).join('');
        for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;
        for(let i=1;i<=daysInMonth;i++) {
            const dStr=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const hasData=state.transactions.some(t=>t.date===dStr);
            html+=`<div class="cal-day${dStr===todayStr?' today':''}" onclick="openDayView('${dStr}')">${i}${hasData?'<div class="cal-dot"></div>':''}</div>`;
        }
        document.getElementById('calGrid').innerHTML = html;
    }

    function openDayView(dateStr) {
        const txs = state.transactions.filter(t=>t.date===dateStr);
        document.getElementById('dayModalTitle').innerText = `Activity on ${dateStr}`;
        document.getElementById('dayModalContent').innerHTML = txs.length===0
            ? '<p class="text-muted">No transactions.</p>'
            : txs.map(t=>`
                <div class="list-item" onclick="closeModal('dayModal');openTransModal(${t.id})">
                    <div><strong>${t.name}</strong><br><small>${t.category}</small></div>
                    <div class="${t.amount<0?'negative':'positive'}">${t.amount<0?'-':'+'}${state.settings.currency}${Math.abs(t.amount)}</div>
                </div>`).join('');
        document.getElementById('dayModal').style.display = 'flex';
    }

    function renderCharts() {
        const catTotals = {}; let inc = 0, exp = 0;
        state.transactions.forEach(t => {
            if(t.amount<0) { exp+=Math.abs(t.amount); catTotals[t.category]=(catTotals[t.category]||0)+Math.abs(t.amount); }
            else inc+=t.amount;
        });
        Chart.defaults.color = state.settings.theme==='dark'?'#fff':'#000';
        setTimeout(() => {
            if(document.getElementById('pieChart')) chartInstances.push(new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:Object.keys(catTotals),datasets:[{data:Object.values(catTotals),backgroundColor:['#4a90e2','#e74c3c','#bb86fc','#2ecc71','#f39c12','#ff8fab'],borderWidth:0}]},options:{responsive:true,cutout:'70%'}}));
            if(document.getElementById('barChart')) chartInstances.push(new Chart(document.getElementById('barChart'),{type:'bar',data:{labels:['Income','Expenses'],datasets:[{data:[inc,exp],backgroundColor:['#2ecc71','#e74c3c'],borderRadius:10}]},options:{responsive:true,plugins:{legend:{display:false}}}}));
        }, 50);
    }

    function handleCategorySelect(selectObj) {
        if(selectObj.value==="NEW_CAT") {
            const newCat = prompt("Enter new category name:");
            if(newCat&&newCat.trim()!=="") {
                state.categories.push(newCat.trim()); saveState();
                selectObj.innerHTML = state.categories.map(c=>`<option value="${c}">${c}</option>`).join('')+`<option value="NEW_CAT">+ Add New...</option>`;
                selectObj.value = newCat.trim();
            } else selectObj.selectedIndex = 0;
        }
    }

    function openTransModal(id=null) {
        editingId=id; editingType='trans';
        const t=id?state.transactions.find(x=>x.id===id):{name:'',merchant:'',amount:'',category:state.categories[0],accountId:state.accounts[0]?.id,date:new Date().toISOString().split('T')[0]};
        if(state.accounts.length===0) return alert("Please create an Account first!");
        document.getElementById('modalTitle').innerText=id?"Edit Transaction":"New Transaction";
        document.getElementById('modalDeleteBtn').style.display=id?"block":"none";
        document.getElementById('modalContent').innerHTML=`
            <select id="fAcc">${state.accounts.map(a=>`<option value="${a.id}" ${t.accountId==a.id?'selected':''}>${a.name}</option>`).join('')}</select>
            <input id="fName" value="${t.name}" placeholder="Title">
            <input id="fMerch" value="${t.merchant}" placeholder="Merchant / Note">
            <select id="fCat" onchange="handleCategorySelect(this)">${state.categories.map(c=>`<option value="${c}" ${t.category===c?'selected':''}>${c}</option>`).join('')}<option value="NEW_CAT">+ Add New Category...</option></select>
            <input id="fAmt" type="number" step="0.01" value="${Math.abs(t.amount)||''}" placeholder="Amount">
            <input type="date" id="fDate" value="${t.date}">`;
        document.getElementById('formModal').style.display='flex';
    }

    function openAccountModal(id=null) {
        editingId=id; editingType='acc';
        const a=id?state.accounts.find(x=>x.id===id):{name:'',initialBalance:0};
        document.getElementById('modalTitle').innerText=id?"Edit Account":"New Account";
        document.getElementById('modalDeleteBtn').style.display=id?"block":"none";
        document.getElementById('modalContent').innerHTML=`<input id="fName" value="${a.name}" placeholder="Account Name"><input id="fAmt" type="number" step="0.01" value="${a.initialBalance}" placeholder="Starting Balance">`;
        document.getElementById('formModal').style.display='flex';
    }

    document.getElementById('modalSaveBtn').onclick = () => {
        if(editingType==='trans') {
            const rawAmt=document.getElementById('fAmt').value.toString();
            let amt=parseFloat(rawAmt)||0;
            if(!rawAmt.startsWith('-')&&!rawAmt.startsWith('+')) amt=document.getElementById('fCat').value.toLowerCase().includes('income')?Math.abs(amt):-Math.abs(amt);
            const newData={id:editingId||Date.now(),accountId:parseInt(document.getElementById('fAcc').value),name:document.getElementById('fName').value||'Unnamed',merchant:document.getElementById('fMerch').value,amount:amt,category:document.getElementById('fCat').value,date:document.getElementById('fDate').value};
            if(editingId) state.transactions=state.transactions.map(t=>t.id===editingId?newData:t); else state.transactions.push(newData);
        } else {
            const newData={id:editingId||Date.now(),name:document.getElementById('fName').value||'New Account',initialBalance:parseFloat(document.getElementById('fAmt').value)||0};
            if(editingId) state.accounts=state.accounts.map(a=>a.id===editingId?newData:a); else state.accounts.push(newData);
        }
        saveState(); closeModal('formModal');
    };

    document.getElementById('modalDeleteBtn').onclick = () => {
        if(confirm("Are you sure?")) {
            if(editingType==='trans') state.transactions=state.transactions.filter(x=>x.id!==editingId);
            else { state.accounts=state.accounts.filter(x=>x.id!==editingId); state.transactions=state.transactions.filter(t=>t.accountId!==editingId); }
            saveState(); closeModal('formModal');
        }
    };

    function closeModal(id) { document.getElementById(id).style.display='none'; }

    function applySettings() {
        document.body.setAttribute('data-theme', state.settings.theme);
        document.documentElement.style.setProperty('--font-size', state.settings.fontSize+'px');
        document.documentElement.style.setProperty('--accent', state.settings.accent);
        let bg;
        if(state.settings.bgGrad==='blue') bg=state.settings.theme==='dark'?'linear-gradient(135deg, #0f172a, #172f45, #264263)':'linear-gradient(135deg, #d9e8f5, #9dbce0)';
        else if(state.settings.bgGrad==='purple') bg=state.settings.theme==='dark'?'linear-gradient(135deg, #121229, #1d2b46, #2e3f5e)':'linear-gradient(135deg, #dde2f0, #b0bcd2)';
        else bg=state.settings.theme==='dark'?'linear-gradient(135deg, #121b29, #192a3d)':'linear-gradient(135deg, #f4f7fb, #d7dee6)';
        document.documentElement.style.setProperty('--bg-grad', bg);
    }
    function updateSetting(key,val) { state.settings[key]=key==='fontSize'?Number(val):val; saveState(); }

    function toggleNetWorthVisibility() {
        state.settings.hideBalances = !state.settings.hideBalances;
        saveState();
    }

    const netWorthToggleBtn = document.getElementById('toggleNetWorthVisibility');
    if (netWorthToggleBtn) netWorthToggleBtn.addEventListener('click', toggleNetWorthVisibility);

    const toggleBtn = document.getElementById('accountsToggle');
    toggleBtn.addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('visible'); });

    // ── Boot from localStorage first ──
    const cached = loadFromLocalStorage();
    if (cached) { state = cached; }
    updateUI();
</script>
