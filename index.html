<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StarBudget">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Smart personal finance tracker with cloud sync.">
  <title>StarBudget</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">

  <!-- Apple touch icons for iOS home screen -->
  <link rel="apple-touch-icon" href="./icon-192x192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="./icon-192x192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icon-512x512.png">

  <!-- iOS splash screens (optional, improves launch feel) -->
  <meta name="apple-touch-startup-image" href="./icon-512x512.png">

  <!-- Google Font: DM Sans + DM Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── CSS RESET & VARIABLES ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0f1a;
      --surface:  #111827;
      --surface2: #1a2333;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0f4ff;
      --text-2:   #8899b4;
      --accent:   #4f8ef7;
      --green:    #22c55e;
      --red:      #ef4444;
      --yellow:   #f59e0b;
      --radius:   16px;
      --radius-sm:10px;
      --font:     'DM Sans', system-ui, sans-serif;
      --mono:     'DM Mono', monospace;
      --nav-h:    60px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top:    env(safe-area-inset-top, 0px);
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* light theme */
    body.light {
      --bg:       #f0f4fc;
      --surface:  #ffffff;
      --surface2: #e8eef8;
      --border:   rgba(0,0,0,0.08);
      --text:     #0f172a;
      --text-2:   #64748b;
    }

    /* ── TYPOGRAPHY ─────────────────────────────────────────────────────── */
    h1 { font-size: clamp(1.8rem, 5vw, 2.4rem); font-weight: 700; line-height: 1.15; letter-spacing: -0.03em; }
    h2 { font-size: clamp(1.2rem, 3vw, 1.5rem); font-weight: 600; letter-spacing: -0.02em; }
    h3 { font-size: 1rem; font-weight: 600; }
    small, .muted { color: var(--text-2); font-size: 0.82rem; }
    .mono { font-family: var(--mono); }
    kbd { background: var(--surface2); border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; font-size: 0.8em; font-family: var(--mono); }

    /* ── OFFLINE BANNER ──────────────────────────────────────────────────── */
    #offlineBanner {
      display: none; background: var(--yellow); color: #000;
      text-align: center; padding: 8px 15px; font-size: 13px; font-weight: 600;
      padding-top: calc(8px + var(--safe-top));
    }

    /* ── LOGIN SCREEN ────────────────────────────────────────────────────── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 3000;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
      padding: 20px;
      padding-top: calc(20px + var(--safe-top));
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 36px;
      width: 100%; max-width: 380px;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .login-logo { font-size: 2.4rem; font-weight: 700; letter-spacing: -0.04em; margin-bottom: 6px; }
    .login-logo span { color: var(--accent); }
    .login-tagline { color: var(--text-2); font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px; }

    /* iOS warning – only show in standalone/iOS */
    .ios-notice {
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 0.83rem;
      color: #f59e0b;
      line-height: 1.5;
      margin-bottom: 20px;
      display: none;
    }

    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: #fff; color: #1a1a1a;
      border: none; border-radius: 12px;
      padding: 14px 20px; width: 100%;
      font-family: var(--font); font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
      min-height: 48px;
    }
    .btn-google:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .btn-google:active { transform: scale(0.98); }
    .btn-google img { width: 20px; height: 20px; flex-shrink: 0; }

    .login-spinner {
      display: none; margin: 16px auto 0;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .login-error {
      display: none; margin-top: 14px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm); padding: 10px 14px;
      color: var(--red); font-size: 0.85rem; line-height: 1.4;
    }

    /* ── TOP NAV (desktop) ──────────────────────────────────────────────── */
    #topNav {
      display: none;
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,15,26,0.85);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: var(--nav-h);
      align-items: center; gap: 24px;
    }
    body.light #topNav { background: rgba(240,244,252,0.85); }

    .nav-brand { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; flex-shrink: 0; }
    .nav-brand span { color: var(--accent); }

    .top-nav-links { display: flex; gap: 4px; flex: 1; }
    .top-nav-links button {
      background: none; border: none; color: var(--text-2);
      font-family: var(--font); font-size: 0.88rem; font-weight: 500;
      padding: 7px 14px; border-radius: 8px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap; min-height: 36px;
    }
    .top-nav-links button:hover { background: var(--surface2); color: var(--text); }
    .top-nav-links button.active { background: var(--accent); color: #fff; }

    .nav-right {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    #syncStatus {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      transition: all 0.3s;
    }
    .sync-ok { background: rgba(34,197,94,0.15); color: var(--green); }
    .sync-fail { background: rgba(239,68,68,0.15); color: var(--red); }

    .user-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 30px; padding: 5px 12px 5px 6px;
    }
    .user-chip img {
      width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
      background: var(--surface);
    }
    .user-chip span { font-size: 0.85rem; font-weight: 600; }
    .btn-logout {
      background: none; border: none;
      color: var(--text-2); font-family: var(--font);
      font-size: 0.82rem; cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s; min-height: 32px;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.1); color: var(--red); }

    /* ── BOTTOM NAV (mobile) ────────────────────────────────────────────── */
    #bottomNav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,15,26,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom);
      height: calc(60px + var(--safe-bottom));
    }
    body.light #bottomNav { background: rgba(240,244,252,0.92); }

    .bottom-nav-inner {
      display: flex; justify-content: space-around; align-items: center;
      height: 60px; padding: 0 8px;
    }

    .bnav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none;
      color: var(--text-2); font-family: var(--font);
      font-size: 0.6rem; font-weight: 500; letter-spacing: 0.02em;
      padding: 6px 12px; border-radius: 12px; cursor: pointer;
      flex: 1; max-width: 80px;
      transition: color 0.15s, background 0.15s;
      min-height: 44px;
    }
    .bnav-btn svg { width: 22px; height: 22px; }
    .bnav-btn.active { color: var(--accent); }
    .bnav-btn.active .bnav-icon { background: rgba(79,142,247,0.15); border-radius: 8px; }

    .bnav-icon {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }

    /* FAB – add transaction */
    .fab {
      position: fixed; right: 20px;
      bottom: calc(var(--safe-bottom) + 76px);
      width: 56px; height: 56px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 50%;
      font-size: 1.6rem; cursor: pointer;
      box-shadow: 0 8px 24px rgba(79,142,247,0.5);
      display: none; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 90;
    }
    .fab:active { transform: scale(0.93); }

    /* ── LAYOUT ──────────────────────────────────────────────────────────── */
    #appShell { display: none; }

    /* desktop: sidebar + content */
    .app-layout {
      display: flex; gap: 0;
      min-height: calc(100dvh - var(--nav-h));
    }

    #sidebar {
      width: 280px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex; flex-direction: column; gap: 16px;
      position: sticky; top: var(--nav-h);
      height: calc(100dvh - var(--nav-h));
      overflow-y: auto; overflow-x: hidden;
    }

    #mainContent {
      flex: 1; min-width: 0;
      padding: 28px 32px;
      overflow: hidden;
    }

    /* ── CARDS ────────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-sm { padding: 16px; }

    /* Net worth card */
    #netWorthCard {
      background: linear-gradient(135deg, #1a2a4a 0%, #0f1a2e 100%);
      border-color: rgba(79,142,247,0.2);
      position: relative; overflow: hidden;
    }
    body.light #netWorthCard {
      background: linear-gradient(135deg, #dce8ff 0%, #c5d8f5 100%);
    }
    #netWorthCard::before {
      content: ''; position: absolute;
      top: -40px; right: -40px;
      width: 130px; height: 130px;
      background: radial-gradient(circle, rgba(79,142,247,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .nw-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-2); margin-bottom: 6px; }
    #netWorthDisplay { font-size: 1.9rem; font-weight: 700; letter-spacing: -0.03em; font-family: var(--mono); }

    /* Account list items */
    .acc-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 12px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      cursor: pointer; margin-bottom: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .acc-item:last-child { margin-bottom: 0; }
    .acc-item:hover { border-color: var(--accent); background: rgba(79,142,247,0.06); }
    .acc-item .acc-name { font-size: 0.88rem; font-weight: 500; }
    .acc-item .acc-bal { font-size: 0.88rem; font-family: var(--mono); font-weight: 600; }

    /* ── VIEWS / DASHBOARD ───────────────────────────────────────────────── */
    .view-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; gap: 12px; flex-wrap: wrap;
    }
    .view-header h2 { margin: 0; }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }
    .stat-card .stat-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2); margin-bottom: 10px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .stat-label { font-size: 0.82rem; color: var(--text-2); }
    .stat-value { font-size: 0.9rem; font-weight: 600; font-family: var(--mono); }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .chart-card h3 { margin-bottom: 16px; }
    .chart-wrap { height: 200px; position: relative; }

    /* Alert banners */
    .alert {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: var(--radius-sm);
      font-size: 0.88rem; font-weight: 500; margin-bottom: 10px;
      animation: slideDown 0.3s ease;
    }
    .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
    .alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.25); color: #fcd34d; }

    /* Recent transactions */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .tx-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      gap: 10px;
    }
    .tx-item:hover { border-color: var(--accent); background: rgba(79,142,247,0.05); }
    .tx-item-left { flex: 1; min-width: 0; }
    .tx-name { font-size: 0.92rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 0.75rem; color: var(--text-2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-amt { font-size: 0.92rem; font-weight: 700; font-family: var(--mono); flex-shrink: 0; }

    /* Budget bars */
    .budget-bar-wrap { margin-bottom: 14px; }
    .budget-bar-labels { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--text-2); margin-bottom: 5px; }
    .budget-bar-track { height: 6px; background: var(--surface2); border-radius: 10px; overflow: hidden; }
    .budget-bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }

    /* Insights */
    .insight-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 8px; }
    .insight-list li {
      font-size: 0.85rem; color: var(--text-2); line-height: 1.4;
      padding: 8px 12px; background: var(--surface2); border-radius: var(--radius-sm);
    }

    /* ── TABLE VIEW ───────────────────────────────────────────────────────── */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-bar input, .filter-bar select {
      flex: 1; min-width: 120px;
    }
    .filter-count { font-size: 0.78rem; color: var(--text-2); display: flex; align-items: center; padding: 0 4px; white-space: nowrap; }

    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; min-width: 520px; }
    thead th { padding: 12px 16px; text-align: left; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-2); border-bottom: 1px solid var(--border); }
    tbody td { padding: 13px 16px; font-size: 0.88rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { cursor: pointer; transition: background 0.12s; }
    tbody tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 600; background: rgba(79,142,247,0.15); color: var(--accent);
    }

    /* ── CALENDAR ─────────────────────────────────────────────────────────── */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 12px; }
    .cal-nav-btns { display: flex; gap: 8px; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 6px; text-align: center;
    }
    .cal-dow { font-size: 0.72rem; font-weight: 600; color: var(--text-2); padding: 6px 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .cal-day {
      padding: 10px 4px; border-radius: 10px;
      background: var(--surface2); border: 1px solid transparent;
      cursor: pointer; min-height: 52px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 0.88rem; font-weight: 500;
      transition: background 0.12s, border-color 0.12s, transform 0.12s;
    }
    .cal-day:hover { background: rgba(79,142,247,0.1); border-color: var(--accent); transform: scale(1.04); }
    .cal-day.today { background: var(--accent); color: #fff; border-color: transparent; }
    .cal-day.empty { background: transparent; cursor: default; border: none; }
    .cal-day.empty:hover { transform: none; }
    .cal-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin-top: 4px; }
    .cal-day.today .cal-dot { background: rgba(255,255,255,0.7); }

    /* ── OVERVIEW / ANALYTICS ─────────────────────────────────────────────── */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }

    /* ── SETTINGS ─────────────────────────────────────────────────────────── */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .settings-section h3 { margin-bottom: 16px; }
    .settings-label { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-2); margin-bottom: 6px; display: block; }
    .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
    .swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; }
    .swatch.active { border-color: var(--text); transform: scale(1.15); }
    .budget-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .budget-row label { flex: 1; font-size: 0.88rem; }
    .budget-row input { flex: 0 0 110px; margin: 0; padding: 8px 10px; }

    /* ── FORMS ─────────────────────────────────────────────────────────────── */
    input, select {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.92rem;
      outline: none; transition: border-color 0.15s;
      -webkit-appearance: none; appearance: none;
      min-height: 44px;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="range"] { padding: 8px 0; min-height: 32px; background: none; border: none; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.04em; }
    option { background: var(--surface); color: var(--text); }

    /* ── BUTTONS ────────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 20px; border-radius: var(--radius-sm); border: none;
      font-family: var(--font); font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: transform 0.12s, filter 0.12s, box-shadow 0.12s;
      min-height: 44px; white-space: nowrap; line-height: 1;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(79,142,247,0.35); }
    .btn-danger  { background: var(--red);   color: #fff; box-shadow: 0 4px 14px rgba(239,68,68,0.3); }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); box-shadow: none; }
    .btn-sm      { padding: 6px 14px; font-size: 0.82rem; min-height: 34px; border-radius: 8px; }
    .btn-icon    { padding: 8px; width: 40px; height: 40px; border-radius: 10px; }

    /* ── MODAL ───────────────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      display: none; align-items: flex-end; justify-content: center;
      padding-bottom: var(--safe-bottom);
    }
    @media (min-width: 600px) { .overlay { align-items: center; padding-bottom: 0; } }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px;
      width: 100%; max-width: 460px;
      max-height: 90dvh; overflow-y: auto;
      animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1) both;
    }
    @media (min-width: 600px) {
      .modal { border-radius: 20px; animation: popIn 0.25s ease both; }
    }

    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    @media (min-width: 600px) { .modal-handle { display: none; } }

    .modal-footer { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .modal-footer .btn { flex: 1; }

    /* ── MISC ─────────────────────────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-2); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

    .toggle-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-2); border-radius: 30px;
      padding: 4px 10px; font-size: 0.78rem; cursor: pointer;
      transition: all 0.15s; min-height: 32px;
    }
    .toggle-btn:hover { background: var(--surface2); }

    /* ── ANIMATIONS ─────────────────────────────────────────────────────── */
    @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { from { opacity:0; transform:scale(0.93); } to { opacity:1; transform:scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .animate-in { animation: slideUp 0.35s ease both; }

    /* ── RESPONSIVE: mobile-first ──────────────────────────────────────── */
    @media (max-width: 768px) {
      #mainContent { padding: 16px 16px calc(16px + 60px + var(--safe-bottom)); }
      #sidebar { display: none !important; }
      .dash-grid { grid-template-columns: 1fr 1fr; }
      .chart-grid { grid-template-columns: 1fr; }
      .settings-grid { grid-template-columns: 1fr; }
      #topNav { display: none !important; }
      #bottomNav { display: flex; flex-direction: column; }
      .fab { display: flex; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (min-width: 769px) {
      #topNav { display: flex; }
      #bottomNav { display: none !important; }
      .fab { display: none; }
      #appShell > .mobile-header { display: none; }
    }

    @media (max-width: 480px) {
      .dash-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 1200px) {
      #sidebar { width: 300px; }
      #mainContent { padding: 32px 40px; }
    }
  </style>
</head>

<!-- ── CHART.JS (lazy-loaded) ────────────────────────────────────────────── -->
<script>
// ── CHART.JS LAZY LOADER ─────────────────────────────────────────────────
let chartJsLoaded = false, chartJsLoading = false, chartReadyCallbacks = [];
function requireChartJs(cb) {
  if (chartJsLoaded) { cb(); return; }
  chartReadyCallbacks.push(cb);
  if (chartJsLoading) return;
  chartJsLoading = true;
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js';
  s.onload = () => { chartJsLoaded = true; chartReadyCallbacks.forEach(f => f()); chartReadyCallbacks = []; };
  document.head.appendChild(s);
}

// ── STATE ────────────────────────────────────────────────────────────────
const LS_KEY = 'starbudget_v2';
const DEFAULT_STATE = {
  transactions: [
    { id: 1, accountId: 1, name: 'Grocery Shopping', merchant: 'Whole Foods', amount: -120.50, category: 'Food', date: new Date().toISOString().split('T')[0] },
    { id: 2, accountId: 1, name: 'Monthly Salary', merchant: 'Tech Corp', amount: 4500.00, category: 'Income', date: new Date().toISOString().split('T')[0] }
  ],
  accounts: [
    { id: 1, name: 'Main Checking', initialBalance: 5000 },
    { id: 2, name: 'Savings', initialBalance: 20000 }
  ],
  categories: ['Food', 'Shopping', 'Income', 'Bills', 'Entertainment', 'Housing', 'Transport'],
  settings: { theme: 'dark', accent: '#4f8ef7', fontSize: 16, currency: '$', budgets: {}, hideBalances: false }
};

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));
let currentView = 'home';
let editingId = null, editingType = null;
let calDate = new Date();
let chartInstances = [];
let filterQuery = '', filterCategory = '', filterAccount = '';
let isOnline = navigator.onLine;
let pendingSync = false;

// ── MIGRATION ─────────────────────────────────────────────────────────────
function migrateState(raw) {
  if (!raw || typeof raw !== 'object') return null;
  if (!Array.isArray(raw.transactions)) raw.transactions = [];
  if (!Array.isArray(raw.accounts)) raw.accounts = [];
  if (!Array.isArray(raw.categories)) raw.categories = DEFAULT_STATE.categories;
  if (!raw.settings || typeof raw.settings !== 'object') raw.settings = {};
  const def = DEFAULT_STATE.settings;
  for (const [k, v] of Object.entries(def)) { if (raw.settings[k] === undefined) raw.settings[k] = v; }
  if (typeof raw.settings.budgets !== 'object' || Array.isArray(raw.settings.budgets)) raw.settings.budgets = {};
  if (typeof raw.settings.hideBalances !== 'boolean') raw.settings.hideBalances = false;
  raw.transactions = raw.transactions.map(t => ({
    id: t.id ?? Date.now(), accountId: t.accountId ?? (raw.accounts[0]?.id ?? 1),
    name: t.name ?? 'Unnamed', merchant: t.merchant ?? '',
    amount: typeof t.amount === 'number' ? t.amount : 0,
    category: t.category ?? raw.categories[0],
    date: t.date ?? new Date().toISOString().split('T')[0]
  }));
  raw.accounts = raw.accounts.map(a => ({
    id: a.id ?? Date.now(), name: a.name ?? 'Account',
    initialBalance: typeof a.initialBalance === 'number' ? a.initialBalance : 0
  }));
  return raw;
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────
function saveLS() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {} }
function loadLS() { try { const r = localStorage.getItem(LS_KEY); return r ? migrateState(JSON.parse(r)) : null; } catch(e) { return null; } }

// ── ONLINE / OFFLINE ──────────────────────────────────────────────────────
function updateOnlineStatus() {
  isOnline = navigator.onLine;
  document.getElementById('offlineBanner').style.display = isOnline ? 'none' : 'block';
}
window.addEventListener('online', () => { updateOnlineStatus(); if (pendingSync && window._firebaseSyncFn) { pendingSync = false; window._firebaseSyncFn(state); } });
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── FIREBASE BRIDGE (set by firebase module) ──────────────────────────────
window.applyCloudState = (cloud) => { const m = migrateState(cloud); if (m) { state = m; saveLS(); updateUI(); } };
window._firebaseSyncFn = null; // set by firebase module
function saveState() { saveLS(); updateUI(); if (!isOnline) { pendingSync = true; return; } if (window._firebaseSyncFn) window._firebaseSyncFn(state); }

// ── HELPERS ───────────────────────────────────────────────────────────────
const cur = () => state.settings.currency;
function fmt(n) { return state.settings.hideBalances ? '••••' : `${cur()}${Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})}` ; }
function fmtSigned(n) { if (state.settings.hideBalances) return '••••'; return `${n>=0?'+':'-'}${cur()}${Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})}`; }

function getBalance(accId) {
  const acc = state.accounts.find(a => a.id == accId);
  if (!acc) return 0;
  return acc.initialBalance + state.transactions.filter(t => t.accountId == accId).reduce((s,t) => s+t.amount, 0);
}
function getTotalNetWorth() { return state.accounts.reduce((s, a) => s + getBalance(a.id), 0); }

function txSummary(txs) {
  return txs.reduce((a, t) => {
    if (t.amount >= 0) a.inc += t.amount; else a.exp += Math.abs(t.amount);
    a.net = a.inc - a.exp; return a;
  }, {inc:0,exp:0,net:0});
}

function monthlySpend() {
  const ym = new Date().toISOString().slice(0,7);
  const t = {};
  state.transactions.forEach(tx => { if (tx.amount<0 && tx.date?.startsWith(ym)) t[tx.category]=(t[tx.category]||0)+Math.abs(tx.amount); });
  return t;
}

function filteredTx() {
  return state.transactions.filter(t => {
    const q = filterQuery.toLowerCase();
    return (!q || t.name.toLowerCase().includes(q) || t.merchant.toLowerCase().includes(q) || t.category.toLowerCase().includes(q))
      && (!filterCategory || t.category === filterCategory)
      && (!filterAccount || String(t.accountId) === String(filterAccount));
  });
}

function budgetBar(cat, spent, limit) {
  if (!limit || limit<=0) return '';
  const pct = Math.min(100, (spent/limit)*100);
  const color = pct>=100 ? 'var(--red)' : pct>=80 ? 'var(--yellow)' : 'var(--green)';
  return `<div class="budget-bar-wrap">
    <div class="budget-bar-labels"><span>${cat}</span><span>${cur()}${spent.toFixed(0)} / ${cur()}${limit.toFixed(0)}</span></div>
    <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct}%;background:${color};"></div></div>
  </div>`;
}

// ── APPLY SETTINGS ─────────────────────────────────────────────────────────
function applySettings() {
  document.body.className = state.settings.theme === 'light' ? 'light' : '';
  document.documentElement.style.setProperty('--accent', state.settings.accent);
  document.documentElement.style.setProperty('--font-size', state.settings.fontSize + 'px');
  document.body.style.fontSize = state.settings.fontSize + 'px';
}

// ── UPDATE SIDEBAR ──────────────────────────────────────────────────────────
function updateSidebar() {
  const nw = getTotalNetWorth();
  document.getElementById('netWorthDisplay').textContent = fmt(nw);
  document.getElementById('netWorthAccCount').textContent = `${state.accounts.length} account${state.accounts.length!==1?'s':''}`;
  const btn = document.getElementById('toggleVisBtn');
  btn.textContent = state.settings.hideBalances ? '🙈' : '👁';

  const accList = document.getElementById('accList');
  if (!state.accounts.length) {
    accList.innerHTML = '<p class="muted" style="font-size:0.82rem;text-align:center;padding:10px;">No accounts yet.</p>';
    return;
  }
  accList.innerHTML = state.accounts.map(a => {
    const bal = getBalance(a.id);
    return `<div class="acc-item" onclick="openAccountModal(${a.id})">
      <span class="acc-name">${a.name}</span>
      <span class="acc-bal" style="color:${bal<0?'var(--red)':'inherit'}">${fmt(bal)}</span>
    </div>`;
  }).join('');
}

// ── RENDER VIEW ──────────────────────────────────────────────────────────────
function renderView() {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];
  const el = document.getElementById('viewContainer');
  el.classList.remove('animate-in');
  void el.offsetWidth;
  el.classList.add('animate-in');

  if (currentView === 'home') renderHome(el);
  else if (currentView === 'transactions') renderTransactions(el);
  else if (currentView === 'calendar') renderCalendar(el);
  else if (currentView === 'overview') renderOverview(el);
  else if (currentView === 'settings') renderSettings(el);
}

// ── HOME DASHBOARD ──────────────────────────────────────────────────────────
function renderHome(el) {
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const monthStr = todayStr.slice(0,7);
  const week = new Date(today); week.setDate(today.getDate()-7);
  const weekStr = week.toISOString().split('T')[0];

  const txToday = state.transactions.filter(t => t.date===todayStr);
  const txWeek  = state.transactions.filter(t => t.date>=weekStr && t.date<=todayStr);
  const txMonth = state.transactions.filter(t => t.date?.startsWith(monthStr));
  const sToday = txSummary(txToday), sWeek = txSummary(txWeek), sMonth = txSummary(txMonth);

  const spend = monthlySpend();
  const budgets = state.settings.budgets || {};
  let alerts = '';
  Object.keys(budgets).forEach(cat => {
    const limit = budgets[cat]; if (!limit) return;
    const pct = ((spend[cat]||0)/limit)*100;
    if (pct>=100) alerts += `<div class="alert alert-danger">⚠️ ${cat} budget exceeded!</div>`;
    else if (pct>=85) alerts += `<div class="alert alert-warning">⚠️ ${cat} budget almost full (${pct.toFixed0()}%)</div>`;
  });

  const budgetPreviews = Object.keys(budgets).filter(c=>budgets[c]>0)
    .map(c=>({cat:c,limit:budgets[c],spent:spend[c]||0}))
    .sort((a,b)=>(b.spent/b.limit)-(a.spent/a.limit)).slice(0,3);

  const insights = [];
  if (sMonth.net>0) insights.push(`Surplus of <strong>${cur()}${sMonth.net.toFixed(2)}</strong> this month.`);
  else if (sMonth.net<0) insights.push(`Deficit of <strong>${cur()}${Math.abs(sMonth.net).toFixed(2)}</strong> this month.`);
  const bigExp = txWeek.filter(t=>t.amount<0).sort((a,b)=>a.amount-b.amount)[0];
  if (bigExp) insights.push(`Biggest this week: <strong>${bigExp.name}</strong> (${cur()}${Math.abs(bigExp.amount).toFixed(2)})`);
  if (sMonth.inc>0) insights.push(`Income this month: <strong>${cur()}${sMonth.inc.toFixed(2)}</strong>`);

  const last7Labels=[], last7Data=[];
  for (let i=6;i>=0;i--) {
    const d=new Date(today); d.setDate(today.getDate()-i);
    last7Labels.push(d.toLocaleDateString('en-US',{weekday:'short'}));
    const ds=d.toISOString().split('T')[0];
    last7Data.push(state.transactions.filter(t=>t.date===ds&&t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0));
  }

  const recent5 = state.transactions.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  const statCard = (title, s) => `<div class="stat-card">
    <div class="stat-title">${title}</div>
    <div class="stat-row"><span class="stat-label">Income</span><span class="stat-value pos">+${cur()}${s.inc.toFixed(2)}</span></div>
    <div class="stat-row"><span class="stat-label">Expenses</span><span class="stat-value neg">-${cur()}${s.exp.toFixed(2)}</span></div>

// ── CALENDAR VIEW ─────────────────────────────────────────────────────────────
function renderCalendar(el) {
  const year = calDate.getFullYear(), month = calDate.getMonth();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const todayStr = new Date().toISOString().split('T')[0];
  const monthLabel = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});

  let daysHTML = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for (let i=0;i<firstDay;i++) daysHTML+=`<div class="cal-day empty"></div>`;
  for (let i=1;i<=daysInMonth;i++) {
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const has=state.transactions.some(t=>t.date===ds);
    daysHTML+=`<div class="cal-day${ds===todayStr?' today':''}" onclick="openDayView('${ds}')">${i}${has?'<div class="cal-dot"></div>':''}</div>`;
  }

  el.innerHTML = `
    <div class="view-header">
      <h2>Smart Calendar</h2>
    </div>
    <div class="chart-card">
      <div class="cal-header">
        <h3 style="margin:0;">${monthLabel}</h3>
        <div class="cal-nav-btns">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="calDate.setMonth(calDate.getMonth()-1);renderView()">‹</button>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="calDate=new Date();renderView()">Today</button>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="calDate.setMonth(calDate.getMonth()+1);renderView()">›</button>
        </div>
      </div>
      <div class="cal-grid">${daysHTML}</div>
    </div>`;
}

function openDayView(dateStr) {
  const txs = state.transactions.filter(t=>t.date===dateStr);
  document.getElementById('dayModalTitle').textContent = `${dateStr}`;
  document.getElementById('dayModalContent').innerHTML = txs.length===0
    ? '<p class="muted">No transactions.</p>'
    : `<div class="tx-list">${txs.map(t=>`
      <div class="tx-item" onclick="closeModal('dayModal');openTransModal(${t.id})">
        <div class="tx-item-left"><div class="tx-name">${t.name}</div><div class="tx-meta">${t.category}</div></div>
        <div class="tx-amt ${t.amount<0?'neg':'pos'}">${t.amount<0?'-':'+'}${cur()}${Math.abs(t.amount).toFixed(2)}</div>
      </div>`).join('')}</div>`;
  document.getElementById('dayModal').style.display='flex';
}

// ── OVERVIEW ─────────────────────────────────────────────────────────────────
function renderOverview(el) {
  const catTotals={}, budgets=state.settings.budgets||{};
  const spend=monthlySpend();
  let inc=0,exp=0;
  state.transactions.forEach(t=>{ if(t.amount<0){exp+=Math.abs(t.amount);catTotals[t.category]=(catTotals[t.category]||0)+Math.abs(t.amount);}else inc+=t.amount; });

  const budCats=Object.keys(budgets).filter(c=>budgets[c]>0);

  el.innerHTML = `
    <div class="view-header"><h2>Analytics</h2></div>
    ${budCats.length ? `<div class="chart-card" style="margin-bottom:20px;">
      <h3 style="margin-bottom:16px;">Monthly Budgets</h3>
      ${budCats.map(c=>budgetBar(c,spend[c]||0,budgets[c])).join('')}
    </div>` : ''}
    <div class="chart-grid">
      <div class="chart-card"><h3>Spending by Category</h3><div class="chart-wrap"><canvas id="pieChart"></canvas></div></div>
      <div class="chart-card"><h3>Income vs Expenses</h3><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>
    </div>`;

  requireChartJs(() => {
    Chart.defaults.color = state.settings.theme==='dark'?'#8899b4':'#64748b';
    const colors=['#4f8ef7','#ef4444','#a78bfa','#22c55e','#f59e0b','#fb7185','#34d399'];
    const pie=document.getElementById('pieChart');
    if(pie) chartInstances.push(new Chart(pie,{type:'doughnut',data:{labels:Object.keys(catTotals),datasets:[{data:Object.values(catTotals),backgroundColor:colors,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom'}}}}));
    const bar=document.getElementById('barChart');
    if(bar) chartInstances.push(new Chart(bar,{type:'bar',data:{labels:['Income','Expenses'],datasets:[{data:[inc,exp],backgroundColor:['#22c55e','#ef4444'],borderRadius:8,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,0.05)'}},x:{grid:{display:false}}}}}));
  });
}

function updateBudget(cat, val) {
  if (!state.settings.budgets) state.settings.budgets={};

  saveState();
}

  document.querySelectorAll('[data-view]').forEach(b => b.classList.toggle('active', b.dataset.view===view));

document.addEventListener('keydown', e => {

function closeModal(id) { document.getElementById(id).style.display='none'; }

function openTransModal(id=null) {
  editingId=id; editingType='trans';
  const t=id?state.transactions.find(x=>x.id===id):{name:'',merchant:'',amount:'',category:state.categories[0],accountId:state.accounts[0]?.id,date:new Date().toISOString().split('T')[0]};

  document.getElementById('modalTitle').textContent = id?'Edit Transaction':'New Transaction';
  document.getElementById('modalDeleteBtn').style.display = id?'inline-flex':'none';
  document.getElementById('modalContent').innerHTML=`
    <div class="form-group"><label class="form-label">Account</label>
      <select id="fAcc">${state.accounts.map(a=>`<option value="${a.id}"${t.accountId==a.id?' selected':''}>${a.name}</option>`).join('')}</select></div>

      <input id="fName" value="${t.name}" placeholder="e.g. Coffee"></div>
    <div class="form-group"><label class="form-label">Merchant / Note</label>
      <input id="fMerch" value="${t.merchant||''}" placeholder="Optional"></div>
    <div class="form-group"><label class="form-label">Category</label>
      <select id="fCat" onchange="handleCatSelect(this)">${state.categories.map(c=>`<option value="${c}"${t.category===c?' selected':''}>${c}</option>`).join('')}<option value="__NEW__">+ Add New Category…</option></select></div>
    <div class="form-group"><label class="form-label">Amount</label>
      <input id="fAmt" type="number" step="0.01" value="${t.amount?Math.abs(t.amount):''}" placeholder="0.00"></div>
    <div class="form-group"><label class="form-label">Date</label>
      <input type="date" id="fDate" value="${t.date}"></div>`;
  document.getElementById('formModal').style.display='flex';
}

function openAccountModal(id=null) {
  editingId=id; editingType='acc';
  const a=id?state.accounts.find(x=>x.id===id):{name:'',initialBalance:0};
  document.getElementById('modalTitle').textContent=id?'Edit Account':'New Account';
  document.getElementById('modalDeleteBtn').style.display=id?'inline-flex':'none';
  document.getElementById('modalContent').innerHTML=`
    <div class="form-group"><label class="form-label">Account Name</label><input id="fName" value="${a.name}" placeholder="e.g. Checking"></div>
    <div class="form-group"><label class="form-label">Starting Balance</label><input id="fAmt" type="number" step="0.01" value="${a.initialBalance}"></div>`;
  document.getElementById('formModal').style.display='flex';
}

function handleCatSelect(sel) {
  if (sel.value==='__NEW__') {
    const nc = prompt('New category name:');
    if (nc?.trim()) { state.categories.push(nc.trim()); saveState(); sel.innerHTML=state.categories.map(c=>`<option value="${c}">${c}</option>`).join('')+`<option value="__NEW__">+ Add New…</option>`; sel.value=nc.trim(); }
    else sel.selectedIndex=0;
  }
}

document.getElementById('modalSaveBtn').onclick = () => {
  if (editingType==='trans') {
    const rawAmt = document.getElementById('fAmt').value.toString();
    let amt = parseFloat(rawAmt)||0;
    const cat = document.getElementById('fCat').value;
    if (!rawAmt.startsWith('-')&&!rawAmt.startsWith('+')) amt = cat.toLowerCase().includes('income') ? Math.abs(amt) : -Math.abs(amt);
    const nd={id:editingId||Date.now(),accountId:parseInt(document.getElementById('fAcc').value),name:document.getElementById('fName').value||'Unnamed',merchant:document.getElementById('fMerch').value,amount:amt,category:cat,date:document.getElementById('fDate').value};
    if(editingId) state.transactions=state.transactions.map(t=>t.id===editingId?nd:t); else state.transactions.push(nd);
  } else {
    const nd={id:editingId||Date.now(),name:document.getElementById('fName').value||'Account',initialBalance:parseFloat(document.getElementById('fAmt').value)||0};
    if(editingId) state.accounts=state.accounts.map(a=>a.id===editingId?nd:a); else state.accounts.push(nd);
  }
  saveState(); closeModal('formModal');
};

document.getElementById('modalDeleteBtn').onclick = () => {
  if (!confirm('Delete this item?')) return;
  if(editingType==='trans') state.transactions=state.transactions.filter(x=>x.id!==editingId);
  else { state.accounts=state.accounts.filter(x=>x.id!==editingId); state.transactions=state.transactions.filter(t=>t.accountId!==editingId); }
  saveState(); closeModal('formModal');
};

// ── MAIN UPDATE UI ──────────────────────────────────────────────────────────
function updateUI() {
  applySettings();
  updateSidebar();
  renderView();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
const cached = loadLS();
if (cached) state = cached;
updateUI();
</script>

function setSynced()  { syncEl.textContent='✓ Synced';   syncEl.className='sync-ok'; setTimeout(()=>{syncEl.textContent='';syncEl.className='';},3000); }
function setSyncErr() { syncEl.textContent='⚠ Sync failed'; syncEl.className='sync-fail'; }

  errEl.style.display = 'none';

  try {
    // iOS Safari (especially standalone) can't do popups reliably.
    // Use redirect always; on desktop non-standalone, prefer popup for better UX.
    const useRedirect = isIOS() || isStandalone();
    if (useRedirect) {
      await signInWithRedirect(auth, provider);
      // Page will reload — spinner stays up until redirect
    } else {
      try {
        await signInWithPopup(auth, provider);
      } catch(popupErr) {
        // Fallback to redirect if popup blocked
        if (popupErr.code === 'auth/popup-blocked' || popupErr.code === 'auth/popup-closed-by-user') {

      errEl.textContent = 'Login failed. Please try again.';
      errEl.style.display = 'block';
      document.getElementById('loginSpinner').style.display = 'none';
    }
  }
})();

// Auth state observer
onAuthStateChanged(auth, async (user) => {
  const loginScreen = document.getElementById('loginScreen');
  const appShell    = document.getElementById('appShell');
  const topNav      = document.getElementById('topNav');
  const bottomNav   = document.getElementById('bottomNav');
  const fab         = document.getElementById('fab');

  if (user) {
    uid = user.uid;
    document.getElementById('userName').textContent = (user.displayName||'User').split(' ')[0];
    if (user.photoURL) document.getElementById('userPic').src = user.photoURL;

    await loadCloud(uid);

    // Fade out login
    loginScreen.style.opacity = '0';
    loginScreen.style.transition = 'opacity 0.35s';
    setTimeout(() => { loginScreen.style.display = 'none'; }, 360);

    appShell.style.display = 'block';
    topNav.style.display = 'flex'; // CSS media query overrides on mobile
    bottomNav.style.display = 'flex'; // same
    fab.style.display = 'flex';

    // Re-apply after display change
    applySettings(); updateSidebar(); renderView();
  } else {
    uid = null;
    loginScreen.style.display = 'flex';
    loginScreen.style.opacity = '1';
    appShell.style.display = 'none';
    topNav.style.display = 'none';
    bottomNav.style.display = 'none';
    fab.style.display = 'none';
    document.getElementById('loginSpinner').style.display = 'none';
  }
});
</script>

      .catch(e => console.warn('[SW] Failed:', e));
  });
}
