<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarBudget | Smart Finance</title>
    <!-- Chart.js for Overview Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #f4f7fb 0%, #d7dee6 100%);
            --card-bg: rgba(255, 255, 255, 0.82);
            --text-main: #24324a;
            --accent: #4a90e2;
            --border-radius: 20px;
            --font-size: 16px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        [data-theme="dark"] {
            --bg-grad: linear-gradient(135deg, #121b29 0%, #192a3d 100%);
            --card-bg: rgba(11, 18, 30, 0.75);
            --text-main: #e9eef5;
            --accent: #4a90e2;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; transition: var(--transition); }

        body {
            margin: 0; background: var(--bg-grad); background-attachment: fixed;
            color: var(--text-main); font-size: var(--font-size);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden; overflow-y: auto;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-view { animation: slideUp 0.5s ease forwards; }

        #loginScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-grad); z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .login-card {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 50px 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 90%; max-width: 400px;
            animation: popIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-google {
            background: #fff; color: #333; padding: 12px 20px;
            border-radius: 25px; font-size: 16px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; margin-top: 30px; cursor: pointer; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

        #navbar, main { display: none; }
        
        nav {
            display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px 20px;
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .nav-links { display: flex; gap: 15px; justify-content: center; flex: 1; }
        .nav-links span { padding: 8px 18px; cursor: pointer; border-radius: 30px; font-weight: 600; opacity: 0.6; }
        .nav-links span:hover { background: var(--card-bg); opacity: 1; transform: translateY(-2px); }
        .nav-links span.active { background: var(--accent); color: white; opacity: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .user-profile {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        #syncStatus {
            width: 90px;
            min-width: 90px;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .logout-btn { background: transparent; color: #e74c3c; box-shadow: none; padding: 5px 8px; font-size: 12px; margin: 0; }
        .logout-btn:hover { background: rgba(231, 76, 60, 0.1); }

        main { flex: 1; overflow: auto; padding: 20px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .view { flex: 3; min-width: 0; background: var(--card-bg); backdrop-filter: blur(20px); border-radius: var(--border-radius); padding: 30px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .sidebar { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .card { background: var(--card-bg); border-radius: var(--border-radius); padding: 25px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        h1, h2, h3 { margin-top: 0; }
        .text-muted { opacity: 0.7; font-size: 0.85em; }
        .positive { color: #2ecc71 !important; font-weight: bold; }
        .negative { font-weight: bold; }

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; margin-bottom: 12px; border-radius: 15px;
            background: rgba(255,255,255,0.1); cursor: pointer; border: 1px solid transparent; gap: 10px;
        }
        /* Prevents text overflow breaking layouts */
        .list-item > div:first-child { flex: 1; min-width: 0; padding-right: 15px; }
        .list-item > div:first-child > div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .list-item:hover { transform: translateX(5px); border-color: var(--accent); background: rgba(255,255,255,0.2); }
        
        /* Table Responsive Base */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
        .table-responsive table { min-width: 600px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        tr:hover td { background: rgba(255,255,255,0.05); cursor: pointer; }

        button {
            border: none; padding: 10px 20px; border-radius: 20px; background: var(--accent);
            color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button.danger { background: #e74c3c; }
        button.secondary { background: transparent; border: 2px solid var(--text-main); color: var(--text-main); box-shadow: none; }
        
        input, select {
            width: 100%; padding: 12px 15px; margin: 8px 0 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
            color: var(--text-main); font-size: 1rem; outline: none; backdrop-filter: blur(5px); box-sizing: border-box;
        }
        input:focus, select:focus { border-color: var(--accent); }
        option { background: var(--bg-grad); color: #000; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { padding: 15px 5px; border-radius: 12px; background: rgba(255,255,255,0.05); cursor: pointer; position: relative; min-height: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .cal-day:hover { background: var(--accent); color: white; transform: scale(1.05); }
        .cal-day.today { background: var(--accent); color: white; box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.12); }
        .cal-day.empty { background: transparent; cursor: default; }
        .cal-day.empty:hover { transform: none; }
        .cal-dot { height: 6px; width: 6px; background: var(--accent); border-radius: 50%; margin-top: 5px; }

        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px; }
        .chart-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: var(--border-radius); }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: var(--bg-grad); padding: 35px; border-radius: var(--border-radius); width: 100%; max-width: 450px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); animation: popIn 0.3s ease; }
        
        .flex-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .signature { position: fixed; bottom: 15px; right: 25px; font-size: 12px; opacity: 0.5; font-weight: bold; letter-spacing: 1px; z-index: 50;}
        
        .color-picker { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .swatch { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .swatch.active { border-color: var(--text-main); transform: scale(1.1); }

        #accountsToggle { display: none; padding: 8px 15px; font-size: 12px; margin-left: 10px; }
        
        /* -------------------------------------------
           MOBILE OPTIMIZATIONS
           ------------------------------------------- */
        @media (max-width: 768px) {
            html, body { min-height: 100%; overflow-x: hidden; }
            nav { padding: 10px 0; gap: 10px; flex-direction: column; }
            .nav-links { 
                flex-wrap: nowrap; 
                overflow-x: auto; 
                justify-content: flex-start; 
                width: 100%; 
                padding: 5px 15px 10px 15px;
                scrollbar-width: none;
                -webkit-overflow-scrolling: touch;
            }
            .nav-links::-webkit-scrollbar { display: none; }
            .nav-links span { flex: 0 0 auto; text-align: center; }
            
            .user-profile { width: auto; margin: 0 15px 10px 15px; justify-content: center; flex-wrap: wrap; }
            #syncStatus { width: auto; min-width: 0; }
            
            main { flex-direction: column; padding: 10px; gap: 10px; overflow: visible; }
            .view, .sidebar { width: 100%; min-width: 0; }
            .view { flex: none; padding: 20px 15px; }
            .sidebar {
                display: flex; position: static; width: 100%; max-width: none;
                height: auto; background: transparent; box-shadow: none; transform: none;
                padding: 0; margin-top: 0;
            }
            .sidebar .card { margin-bottom: 15px; }
            #accountsToggle { display: none; }
            .table-responsive table { min-width: 100%; }
            
            .chart-grid { grid-template-columns: 1fr; gap: 20px; }
            .settings-grid { grid-template-columns: 1fr; gap: 15px; }
            
            .flex-row { justify-content: center; flex-wrap: wrap; }
            .flex-row button { flex-grow: 1; }
            
            .modal { max-width: 95%; padding: 25px 20px; max-height: 90vh; overflow-y: auto; }
            
            .cal-header { flex-direction: column; gap: 15px; align-items: stretch; text-align: center; }
            .cal-header > div { display: flex; justify-content: space-between; align-items: center; width: 100%; flex-wrap: wrap; gap: 10px; }
            #calMonthYear { margin: 0; }
            .calendar-grid { gap: 4px; }
            .cal-day { min-height: 48px; padding: 10px 2px; font-size: 13px; }
            
            h1 { font-size: 2em !important; }
            h2 { font-size: 1.5em; }

            .signature { position: relative; bottom: 0; right: 0; text-align: center; padding: 15px 0; display: block;}
        }
    </style>
</head>
<body data-theme="dark">

    <div id="loginScreen">
        <div class="login-card">
            <h1 style="font-size: 2.8em; margin-bottom: 5px;">Star<span style="color: var(--accent)">Budget</span></h1>
            <p class="text-muted" style="letter-spacing: 2px;">SMART FINANCE</p>
            <button class="btn-google" id="googleSignInBtn">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="24" alt="Google Logo">
                Sign in with Google
            </button>
        </div>
    </div>

    <nav id="navbar">
        <div class="nav-links" id="navLinks">
            <span data-target="home" class="active">Home</span>
            <span data-target="table">Transactions</span>
            <span data-target="calendar">Smart Calendar</span>
            <span data-target="overview">Overview</span>
            <span data-target="settings">Settings</span>
        </div>
        
        <div class="user-profile" id="userProfile">
            <span id="syncStatus" style="font-size: 11px; font-weight: bold; margin-right: 8px;"></span>
            <img id="userPic" src="https://via.placeholder.com/32" alt="Profile">
            <span id="userName" style="font-size: 14px; font-weight: bold;">User</span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <main id="appMain">
        <section class="view animate-view" id="view-container"></section>

        <aside class="sidebar" id="sidebar">
            <div class="card">
                <div class="text-muted" style="letter-spacing:1px;">TOTAL NET WORTH</div>
                <h1 id="netWorthDisplay" style="font-size: 2.5em; margin: 10px 0;">$0.00</h1>
            </div>
            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
                    <strong style="letter-spacing:1px;">ACCOUNTS</strong>
                    <div style="display:flex; align-items: center;">
                        <button onclick="openAccountModal()" style="padding: 5px 12px; font-size:12px; margin-right:5px;">Add +</button>
                        <button id="accountsToggle" style="padding: 5px 12px; font-size:12px;">&times;</button>
                    </div>
                </div>
                <div id="accList"></div>
            </div>
        </aside>
    </main>

    <!-- Modals -->
    <div class="overlay" id="formModal">
        <div class="modal">
            <h2 id="modalTitle">Edit</h2>
            <div id="modalContent"></div>
            <div class="flex-row">
                <button class="secondary" onclick="closeModal('formModal')">Cancel</button>
                <button class="danger" id="modalDeleteBtn">Delete</button>
                <button id="modalSaveBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="dayModal">
        <div class="modal" style="max-width: 500px;">
            <h2 id="dayModalTitle">Transactions</h2>
            <div id="dayModalContent" style="max-height: 300px; overflow-y: auto; margin: 15px 0;"></div>
            <div class="flex-row">
                <button onclick="closeModal('dayModal')">Close</button>
            </div>
        </div>
    </div>

    <div class="signature">Created by Adit Malakar</div>

    <script>
        const DEFAULT_STATE = {
            transactions: [
                { id: 1, accountId: 1, name: "Grocery Shopping", merchant: "Whole Foods", amount: -120.50, category: "Food", date: new Date().toISOString().split('T')[0] },
                { id: 2, accountId: 1, name: "Monthly Salary", merchant: "Tech Corp", amount: 4500.00, category: "Income", date: new Date().toISOString().split('T')[0] }
            ],
            accounts: [
                { id: 1, name: "Main Checking", initialBalance: 5000 },
                { id: 2, name: "High Yield Savings", initialBalance: 20000 }
            ],
            categories: ["Food", "Shopping", "Income", "Bills", "Entertainment", "Housing"],
            settings: { theme: 'dark', bgGrad: 'purple', accent: '#bb86fc', fontSize: 16, currency: '$' }
        };

        let state = DEFAULT_STATE;
        let currentView = 'home';
        let editingId = null;
        let editingType = null;
        let calDate = new Date(); 
        let chartInstances = []; 
        let isSidebarVisible = false;

        window.applyCloudState = function(cloudState) {
            if (cloudState) {
                state = cloudState;
                updateUI();
            }
        };

        window.firebaseSyncState = async (appState) => {
            console.warn('Firebase sync not ready yet.');
        };

        function saveState() {
            updateUI();
            if (window.firebaseSyncState) {
                window.firebaseSyncState(state);
            }
        }

        function getAccountBalance(accId) {
            const acc = state.accounts.find(a => a.id == accId);
            if (!acc) return 0;
            const txs = state.transactions.filter(t => t.accountId == accId);
            return acc.initialBalance + txs.reduce((total, t) => total + t.amount, 0);
        }

        function updateUI() {
            applySettings();
            let totalNetWorth = 0;
            const accHTML = state.accounts.map(acc => {
                const bal = getAccountBalance(acc.id);
                totalNetWorth += bal;
                return `
                    <div class="list-item" onclick="openAccountModal(${acc.id})" style="padding: 10px 15px;">
                        <span>${acc.name}</span>
                        <strong style="color: ${bal < 0 ? '#e74c3c' : 'inherit'}">${state.settings.currency}${bal.toLocaleString(undefined, {minimumFractionDigits:2})}</strong>
                    </div>`;
            }).join('');
            
            document.getElementById('accList').innerHTML = accHTML || '<p class="text-muted">No accounts added.</p>';
            document.getElementById('netWorthDisplay').innerText = `${state.settings.currency}${totalNetWorth.toLocaleString(undefined, {minimumFractionDigits:2})}`;
            renderView();
        }

        document.querySelectorAll('#navLinks span').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('#navLinks span').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.target;
                renderView();
            };
        });

        function renderView() {
            const container = document.getElementById('view-container');
            container.innerHTML = ""; 
            container.classList.remove('animate-view');
            void container.offsetWidth; 
            container.classList.add('animate-view');

            if(chartInstances.length) {
                chartInstances.forEach(c => c.destroy());
                chartInstances = [];
            }

            if (currentView === 'home') {
                const recent = state.transactions.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 15);
                container.innerHTML = `
                    <div class="cal-header"><h2>Recent Activity</h2><button onclick="openTransModal()">+ New Transaction</button></div>
                    ${recent.map(t => `
                        <div class="list-item" onclick="openTransModal(${t.id})">
                            <div><div style="font-size:1.1em; font-weight:600;">${t.name}</div><div class="text-muted">${t.category} • ${state.accounts.find(a => a.id == t.accountId)?.name || 'Unknown'} • ${t.date}</div></div>
                            <div class="${t.amount < 0 ? 'negative' : 'positive'}">${t.amount < 0 ? '-' : '+'}${state.settings.currency}${Math.abs(t.amount).toFixed(2)}</div>
                        </div>
                    `).join('') || '<p class="text-muted">No recent transactions.</p>'}
                `;
            } else if (currentView === 'table') {
                const sorted = state.transactions.slice().sort((a,b) => new Date(b.date) - new Date(a.date));
                container.innerHTML = `
                    <h2>All Transactions</h2>
                    <div class="table-responsive">
                        <table>
                            <thead><tr><th>Date</th><th>Item</th><th>Account</th><th>Category</th><th>Amount</th></tr></thead>
                            <tbody>${sorted.map(t => `
                                <tr onclick="openTransModal(${t.id})">
                                    <td>${t.date}</td><td><strong>${t.name}</strong><br><small class="text-muted">${t.merchant}</small></td>
                                    <td>${state.accounts.find(a => a.id == t.accountId)?.name || 'N/A'}</td>
                                    <td><span style="background:var(--accent); padding:3px 8px; border-radius:10px; font-size:12px; color:#fff;">${t.category}</span></td>
                                    <td class="${t.amount < 0 ? 'negative' : 'positive'}">${state.settings.currency}${t.amount.toFixed(2)}</td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } else if (currentView === 'calendar') {
                container.innerHTML = `
                    <div class="cal-header"><h2>Smart Calendar</h2><div>
                        <button class="secondary" onclick="changeMonth(-1)" style="padding: 8px 15px;">&lt;</button>
                        <span id="calMonthYear" style="margin: 0 15px; font-weight:bold; font-size:1.2em;"></span>
                        <button class="secondary" onclick="changeMonth(1)" style="padding: 8px 15px;">&gt;</button>
                    </div></div><div class="calendar-grid" id="calGrid"></div>
                `;
                renderCalendar();
            } else if (currentView === 'overview') {
                container.innerHTML = `<h2>Analytics Overview</h2><div class="chart-grid"><div class="chart-box"><h3>Spending by Category</h3><canvas id="pieChart"></canvas></div><div class="chart-box"><h3>Income vs Expenses</h3><canvas id="barChart"></canvas></div></div>`;
                renderCharts();
            } else if (currentView === 'settings') {
                const colors = ['#4a90e2', '#e74c3c', '#bb86fc', '#2ecc71', '#f39c12', '#ff8fab'];
                container.innerHTML = `
                    <h2>App Settings</h2>
                    <div class="settings-grid">
                        <div>
                            <label class="text-muted">Theme Mode</label>
                            <select onchange="updateSetting('theme', this.value)">
                                <option value="light" ${state.settings.theme === 'light' ? 'selected' : ''}>Light Mode</option><option value="dark" ${state.settings.theme === 'dark' ? 'selected' : ''}>Dark Mode</option>
                            </select>
                            <label class="text-muted">Background Style</label>
                            <select onchange="updateSetting('bgGrad', this.value)">
                                <option value="light" ${state.settings.bgGrad === 'light' ? 'selected' : ''}>Warm Marble</option><option value="blue" ${state.settings.bgGrad === 'blue' ? 'selected' : ''}>Ocean Blue</option><option value="purple" ${state.settings.bgGrad === 'purple' ? 'selected' : ''}>Deep Galaxy</option>
                            </select>
                            <label class="text-muted">Currency</label>
                            <select onchange="updateSetting('currency', this.value)">
                                <option value="$" ${state.settings.currency === '$' ? 'selected' : ''}>USD ($)</option><option value="€" ${state.settings.currency === '€' ? 'selected' : ''}>Euro (€)</option><option value="£" ${state.settings.currency === '£' ? 'selected' : ''}>GBP (£)</option><option value="Rs. " ${state.settings.currency === 'Rs. ' ? 'selected' : ''}>NRS/INR (Rs.)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-muted">Accent Color</label>
                            <div class="color-picker">${colors.map(c => `<div class="swatch ${state.settings.accent === c ? 'active' : ''}" style="background:${c}" onclick="updateSetting('accent', '${c}')"></div>`).join('')}</div>
                            <label class="text-muted">Interface Scale</label>
                            <input type="range" min="14" max="22" value="${state.settings.fontSize}" onchange="updateSetting('fontSize', this.value)">
                        </div>
                    </div>`;
            }
        }

        function changeMonth(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }
        function renderCalendar() {
            const year = calDate.getFullYear(), month = calDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay(), daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('calMonthYear').innerText = new Date(year, month).toLocaleString('default', { month: 'long', year: 'numeric' });
            let html = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div style="font-weight:bold; opacity:0.7;">${d}</div>`).join('');
            for(let i=0; i<firstDay; i++) html += `<div class="cal-day empty"></div>`;
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasData = state.transactions.some(t => t.date === dStr);
                const todayClass = dStr === todayStr ? ' today' : '';
                html += `<div class="cal-day${todayClass}" onclick="openDayView('${dStr}')">${i} ${hasData ? '<div class="cal-dot"></div>' : ''}</div>`;
            }
            document.getElementById('calGrid').innerHTML = html;
        }

        function openDayView(dateStr) {
            const txs = state.transactions.filter(t => t.date === dateStr);
            document.getElementById('dayModalTitle').innerText = `Activity on ${dateStr}`;
            document.getElementById('dayModalContent').innerHTML = txs.length === 0 ? '<p class="text-muted">No transactions.</p>' : txs.map(t => `
                <div class="list-item" onclick="closeModal('dayModal'); openTransModal(${t.id})">
                    <div><strong>${t.name}</strong><br><small>${t.category}</small></div>
                    <div class="${t.amount < 0 ? 'negative' : 'positive'}">${t.amount < 0 ? '-' : '+'}${state.settings.currency}${Math.abs(t.amount)}</div>
                </div>`).join('');
            document.getElementById('dayModal').style.display = 'flex';
        }

        function renderCharts() {
            const catTotals = {}; let inc = 0, exp = 0;
            state.transactions.forEach(t => {
                if(t.amount < 0) { exp += Math.abs(t.amount); catTotals[t.category] = (catTotals[t.category] || 0) + Math.abs(t.amount); } 
                else inc += t.amount;
            });
            Chart.defaults.color = state.settings.theme === 'dark' ? '#fff' : '#000';
            chartInstances.push(new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: Object.keys(catTotals), datasets: [{ data: Object.values(catTotals), backgroundColor: ['#4a90e2', '#e74c3c', '#bb86fc', '#2ecc71', '#f39c12', '#ff8fab'], borderWidth: 0 }] }, options: { responsive: true, cutout: '70%' } }));
            chartInstances.push(new Chart(document.getElementById('barChart'), { type: 'bar', data: { labels: ['Income', 'Expenses'], datasets: [{ data: [inc, exp], backgroundColor: ['#2ecc71', '#e74c3c'], borderRadius: 10 }] }, options: { responsive: true, plugins: { legend: { display: false } } } }));
        }

        function handleCategorySelect(selectObj) {
            if(selectObj.value === "NEW_CAT") {
                const newCat = prompt("Enter new category name:");
                if(newCat && newCat.trim() !== "") {
                    state.categories.push(newCat.trim()); saveState();
                    selectObj.innerHTML = state.categories.map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="NEW_CAT">+ Add New...</option>`;
                    selectObj.value = newCat.trim();
                } else selectObj.selectedIndex = 0;
            }
        }

        function openTransModal(id = null) {
            editingId = id; editingType = 'trans';
            const t = id ? state.transactions.find(x => x.id === id) : { name: '', merchant: '', amount: '', category: state.categories[0], accountId: state.accounts[0]?.id, date: new Date().toISOString().split('T')[0] };
            if(state.accounts.length === 0) return alert("Please create an Account first!");
            document.getElementById('modalTitle').innerText = id ? "Edit Transaction" : "New Transaction";
            document.getElementById('modalDeleteBtn').style.display = id ? "block" : "none";
            document.getElementById('modalContent').innerHTML = `
                <select id="fAcc">${state.accounts.map(a => `<option value="${a.id}" ${t.accountId==a.id?'selected':''}>${a.name}</option>`).join('')}</select>
                <input id="fName" value="${t.name}" placeholder="Title">
                <input id="fMerch" value="${t.merchant}" placeholder="Merchant / Note">
                <select id="fCat" onchange="handleCategorySelect(this)">${state.categories.map(c => `<option value="${c}" ${t.category===c?'selected':''}>${c}</option>`).join('')}<option value="NEW_CAT">+ Add New Category...</option></select>
                <input id="fAmt" type="number" step="0.01" value="${Math.abs(t.amount) || ''}" placeholder="Amount">
                <input type="date" id="fDate" value="${t.date}">
            `;
            document.getElementById('formModal').style.display = 'flex';
        }

        function openAccountModal(id = null) {
            editingId = id; editingType = 'acc';
            const a = id ? state.accounts.find(x => x.id === id) : { name: '', initialBalance: 0 };
            document.getElementById('modalTitle').innerText = id ? "Edit Account" : "New Account";
            document.getElementById('modalDeleteBtn').style.display = id ? "block" : "none";
            document.getElementById('modalContent').innerHTML = `<input id="fName" value="${a.name}" placeholder="Account Name"><input id="fAmt" type="number" step="0.01" value="${a.initialBalance}" placeholder="Starting Balance">`;
            document.getElementById('formModal').style.display = 'flex';
        }

        document.getElementById('modalSaveBtn').onclick = () => {
            if (editingType === 'trans') {
                const rawAmt = document.getElementById('fAmt').value.toString();
                let amt = parseFloat(rawAmt) || 0;
                if (!rawAmt.startsWith('-') && !rawAmt.startsWith('+')) amt = document.getElementById('fCat').value.toLowerCase().includes('income') ? Math.abs(amt) : -Math.abs(amt);
                const newData = { id: editingId || Date.now(), accountId: parseInt(document.getElementById('fAcc').value), name: document.getElementById('fName').value || 'Unnamed', merchant: document.getElementById('fMerch').value, amount: amt, category: document.getElementById('fCat').value, date: document.getElementById('fDate').value };
                if (editingId) state.transactions = state.transactions.map(t => t.id === editingId ? newData : t); else state.transactions.push(newData);
            } else {
                const newData = { id: editingId || Date.now(), name: document.getElementById('fName').value || 'New Account', initialBalance: parseFloat(document.getElementById('fAmt').value) || 0 };
                if (editingId) state.accounts = state.accounts.map(a => a.id === editingId ? newData : a); else state.accounts.push(newData);
            }
            saveState(); closeModal('formModal');
        };

        document.getElementById('modalDeleteBtn').onclick = () => {
            if(confirm("Are you sure?")) {
                if (editingType === 'trans') state.transactions = state.transactions.filter(x => x.id !== editingId);
                else { state.accounts = state.accounts.filter(x => x.id !== editingId); state.transactions = state.transactions.filter(t => t.accountId !== editingId); }
                saveState(); closeModal('formModal');
            }
        };

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function applySettings() {
            document.body.setAttribute('data-theme', state.settings.theme);
            document.documentElement.style.setProperty('--font-size', state.settings.fontSize + 'px');
            document.documentElement.style.setProperty('--accent', state.settings.accent);
            let bg;
            if (state.settings.bgGrad === 'blue') bg = state.settings.theme === 'dark' ? 'linear-gradient(135deg, #0f172a, #172f45, #264263)' : 'linear-gradient(135deg, #d9e8f5, #9dbce0)';
            else if (state.settings.bgGrad === 'purple') bg = state.settings.theme === 'dark' ? 'linear-gradient(135deg, #121229, #1d2b46, #2e3f5e)' : 'linear-gradient(135deg, #dde2f0, #b0bcd2)';
            else bg = state.settings.theme === 'dark' ? 'linear-gradient(135deg, #121b29, #192a3d)' : 'linear-gradient(135deg, #f4f7fb, #d7dee6)';
            document.documentElement.style.setProperty('--bg-grad', bg);
        }
        function updateSetting(key, val) { state.settings[key] = key === 'fontSize' ? Number(val) : val; saveState(); }

        const sidebar = document.getElementById('sidebar'), toggleBtn = document.getElementById('accountsToggle');
        toggleBtn.addEventListener('click', () => { sidebar.classList.toggle('visible'); isSidebarVisible = sidebar.classList.contains('visible'); });
        
        updateUI();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4y0KVpqNda3yBCJ4qjm5k8gw7BaThZ60",
            authDomain: "starbudget-ed80c.firebaseapp.com",
            projectId: "starbudget-ed80c",
            storageBucket: "starbudget-ed80c.firebasestorage.app",
            messagingSenderId: "36097989310",
            appId: "1:36097989310:web:808eec8418311d08c69cef",
            measurementId: "G-3TRKFDHY01"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginScreen = document.getElementById('loginScreen');
        const navbar = document.getElementById('navbar');
        const mainApp = document.getElementById('appMain');
        const userName = document.getElementById('userName');
        const userPic = document.getElementById('userPic');
        const syncStatus = document.getElementById('syncStatus');

        let currentUserUid = null;
        let syncTimeout = null;

        window.firebaseSyncState = async (appState) => {
            if (!currentUserUid) return;
            
            try {
                if (syncTimeout) clearTimeout(syncTimeout);
                syncStatus.innerText = "Syncing...";
                syncStatus.style.color = "var(--text-main)";
                
                await setDoc(doc(db, "users", currentUserUid), { data: appState });
                
                syncStatus.innerText = "Sync Completed";
                syncStatus.style.color = "#2ecc71";
                
                syncTimeout = setTimeout(() => {
                    syncStatus.innerText = "";
                }, 3000);
            } catch (error) {
                console.error("Cloud Sync Error:", error);
                syncStatus.innerText = "Sync Failed ❌";
                syncStatus.style.color = "#e74c3c";
            }
        };

        async function loadDataFromCloud(uid) {
            try {
                syncStatus.innerText = "Fetching Cloud Data...";
                const docSnap = await getDoc(doc(db, "users", uid));
                if (docSnap.exists()) {
                    window.applyCloudState(docSnap.data().data);
                    syncStatus.innerText = "Sync Completed";
                    syncStatus.style.color = "#2ecc71";
                    setTimeout(() => syncStatus.innerText = "", 3000);
                } else {
                    window.firebaseSyncState(state);
                }
            } catch (error) {
                console.error("Error loading cloud data:", error);
            }
        }

        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                alert("Login Failed: " + error.message);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserUid = user.uid;
                await loadDataFromCloud(user.uid);

                loginScreen.style.opacity = '0';
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    navbar.style.display = 'flex';
                    mainApp.style.display = 'flex';
                    userName.innerText = user.displayName.split(' ')[0];
                    userPic.src = user.photoURL;
                }, 400);
            } else {
                currentUserUid = null;
                loginScreen.style.display = 'flex';
                loginScreen.style.opacity = '1';
                navbar.style.display = 'none';
                mainApp.style.display = 'none';
            }
        });
    </script>
